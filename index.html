<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Inkwell"/>
<meta name="theme-color" content="#0a0a0c" id="themeColorMeta"/>
<title>Inkwell Journal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230a0a0c'/><text x='90' y='130' font-size='110' text-anchor='middle' fill='%23bf8c52'>✦</text></svg>"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{background:var(--bg);color:var(--fg);transition:background .25s,color .25s;}
input,textarea,button{font-family:inherit;}
textarea{resize:none;}
button{cursor:pointer;border:none;background:none;}

/* ── THEME VARS ── */
:root{
  --bg:#0a0a0c;--s1:#111115;--s2:#17171d;--s3:#1f1f27;--s4:#2a2a35;
  --ln:#22222c;--ln2:#2e2e3a;
  --Au:#bf8c52;--AuL:#d4a46a;--AuD:#7a5830;--Aub:rgba(191,140,82,.1);
  --fg:#eae5dc;--f2:#9896a0;--f3:#54525e;--f4:#363440;
  --gr:#5c9e78;--bl:#5c7e9e;--re:#9e5c5c;
  --nav-bg:rgba(10,10,12,.94);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#f5f4f0;--s1:#ffffff;--s2:#f0ede8;--s3:#e8e4de;--s4:#ddd9d2;
  --ln:#e0dbd4;--ln2:#cdc8c0;
  --Au:#a07240;--AuL:#bf8c52;--AuD:#7a5830;--Aub:rgba(160,114,64,.1);
  --fg:#1a1816;--f2:#5a5650;--f3:#8a8680;--f4:#b0aca8;
  --gr:#3a7e58;--bl:#3a5e7e;--re:#7e3a3a;
  --nav-bg:rgba(245,244,240,.94);
}
[data-theme="sepia"]{
  --bg:#1a1610;--s1:#211c14;--s2:#28221a;--s3:#302a20;--s4:#3a3228;
  --ln:#3a3228;--ln2:#4a4236;
  --Au:#c8a060;--AuL:#e0b878;--AuD:#8a6830;--Aub:rgba(200,160,96,.1);
  --fg:#f0e8d8;--f2:#b0a898;--f3:#706858;--f4:#504840;
  --gr:#6a9e78;--bl:#6a8e9e;--re:#9e6a5a;
  --nav-bg:rgba(26,22,16,.94);
}
[data-theme="midnight"]{
  --bg:#060810;--s1:#0c0e1a;--s2:#121420;--s3:#181c28;--s4:#202433;
  --ln:#1e2230;--ln2:#282e40;
  --Au:#8a9ee0;--AuL:#a0b0f0;--AuD:#5a6aaa;--Aub:rgba(138,158,224,.1);
  --fg:#dce0f0;--f2:#8890a8;--f3:#505870;--f4:#343850;
  --gr:#5a9e88;--bl:#5a7ea8;--re:#9e5a6a;
  --nav-bg:rgba(6,8,16,.94);
}

/* ── LAYOUT ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--sat) + 12px) 18px 10px;
  background:var(--bg);border-bottom:.5px solid transparent;
  flex-shrink:0;z-index:50;transition:border-color .2s,background .25s;min-height:calc(var(--sat) + 52px);
}
#topbar.lined{border-bottom-color:var(--ln);}
.tb-title{font-family:'Libre Baskerville',serif;font-size:19px;font-weight:400;color:var(--fg);letter-spacing:.01em;}
.tb-left{display:flex;align-items:center;gap:8px;}
.tb-actions{display:flex;align-items:center;gap:2px;}
.icon-btn{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:background .12s;color:var(--f2);}
.icon-btn:active{background:var(--s3);}
.hbtn{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;width:36px;height:36px;border-radius:9px;transition:background .12s;padding-right:2px;}
.hbtn:active{background:var(--s3);}
.hl{height:.5px;background:var(--f2);border-radius:99px;}

#screen{flex:1;overflow:hidden;position:relative;}
#page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sab) + 72px);}
#page::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
#bnav{
  display:flex;align-items:center;
  padding:8px 4px calc(var(--sab) + 8px);
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--ln);
  flex-shrink:0;z-index:50;
  transition:background .25s,border-color .25s;
}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;cursor:pointer;user-select:none;transition:opacity .1s;}
.nt:active{opacity:.6;}
.nt svg path,.nt svg rect,.nt svg circle{transition:stroke .2s;}
.nt-lbl{font-size:9.5px;font-weight:500;letter-spacing:.03em;color:var(--f3);transition:color .2s;}
.nt.on .nt-lbl{color:var(--Au);}
.nt-dot{width:3px;height:3px;border-radius:50%;background:var(--Au);opacity:0;transition:opacity .2s;margin-top:1px;}
.nt.on .nt-dot{opacity:1;}

/* ── PAGE ANIM ── */
.pin{animation:pin .22s ease;}
@keyframes pin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPOGRAPHY ── */
.serif{font-family:'Libre Baskerville',serif;}
.mono{font-family:'DM Mono',monospace;}
.slabel{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);}
.slink{font-size:11.5px;color:var(--Au);cursor:pointer;}
.srow-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px;}

/* ── BLOCKS ── */
.block{background:var(--s1);border-top:.5px solid var(--ln);border-bottom:.5px solid var(--ln);margin-bottom:1px;transition:background .25s,border-color .25s;}
.mdlabel{padding:12px 20px 4px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);letter-spacing:.1em;text-transform:uppercase;}

/* ── HOME ── */
.h-hero{padding:20px 20px 0;}
.h-date{font-size:11px;color:var(--f3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.h-name{font-family:'Libre Baskerville',serif;font-size:32px;font-weight:400;color:var(--fg);line-height:1.06;}
.h-name em{font-style:italic;color:var(--Au);}
.streak-band{display:flex;margin:14px 20px 0;background:var(--s1);border:.5px solid var(--ln);border-radius:12px;overflow:hidden;transition:background .25s;}
.streak-seg{flex:1;padding:11px 8px;text-align:center;border-right:.5px solid var(--ln);}
.streak-seg:last-child{border-right:none;}
.streak-v{font-family:'DM Mono',monospace;font-size:20px;color:var(--fg);}
.streak-v.au{color:var(--Au);}
.streak-l{font-size:9px;color:var(--f3);margin-top:3px;letter-spacing:.08em;text-transform:uppercase;}
.otd-card{margin:14px 20px 0;background:var(--s1);border:.5px solid var(--ln);border-left:2px solid var(--Au);border-radius:0 12px 12px 0;padding:14px 16px;cursor:pointer;transition:background .12s;}
.otd-card:active{background:var(--s2);}
.otd-eye{font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--Au);margin-bottom:5px;}
.otd-title{font-family:'Libre Baskerville',serif;font-size:16px;color:var(--fg);line-height:1.3;margin-bottom:4px;}
.otd-prev{font-size:12.5px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.otd-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--f3);margin-top:8px;}
.quote-wrap{margin:14px 20px 0;padding:14px 0;border-top:.5px solid var(--ln);border-bottom:.5px solid var(--ln);}
.quote-body{font-family:'Libre Baskerville',serif;font-size:15px;font-style:italic;color:var(--f2);line-height:1.65;}
.quote-attr{font-size:10px;color:var(--f3);margin-top:7px;letter-spacing:.08em;}
.act-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;}
.aday{aspect-ratio:1;border-radius:6px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8.5px;color:var(--f4);transition:background .25s;}
.aday.w{background:var(--Aub);color:var(--Au);}
.aday.today{background:var(--Au);color:#1a1000;font-weight:700;}

/* ── ENTRY ITEM ── */
.eitem{padding:14px 20px;border-bottom:.5px solid var(--ln);cursor:pointer;transition:background .12s;}
.eitem:last-child{border-bottom:none;}
.eitem:active{background:var(--s2);}
.eitem-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.eitem-left{display:flex;align-items:center;gap:7px;}
.edot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.edate{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);letter-spacing:.04em;}
.emeta{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);}
.etitle{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;color:var(--fg);line-height:1.2;margin-bottom:4px;}
.eprev{font-size:12.5px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.efooter{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap;}
.mood-tag{font-size:10.5px;padding-left:6px;border-left:2px solid;}
.etag{padding:2px 8px;border-radius:4px;background:var(--s3);font-size:10px;color:var(--f3);}

/* ── ENTRY DETAIL ── */
#entry-detail{position:absolute;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;animation:pin .2s ease;transition:background .25s;}
.ed-head{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat) + 12px) 20px 10px;border-bottom:.5px solid var(--ln);flex-shrink:0;}
.ed-back{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--Au);font-size:13.5px;}
.ed-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:30px;}
.ed-scroll::-webkit-scrollbar{display:none;}
.ed-title{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;color:var(--fg);line-height:1.2;padding:18px 20px 10px;}
.ed-chips{display:flex;gap:7px;padding:0 20px 14px;flex-wrap:wrap;}
.echip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:var(--s2);border:.5px solid var(--ln);font-size:11px;color:var(--f3);}
.echip-dot{width:5px;height:5px;border-radius:50%;}
.ed-div{height:.5px;background:var(--ln);margin:0 20px 16px;}
.ed-para{font-family:'DM Sans',sans-serif;font-size:15px;color:var(--f2);line-height:1.82;font-weight:300;padding:0 20px;margin-bottom:14px;}
.ed-photo-row{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px;}
.ed-photo-row::-webkit-scrollbar{display:none;}
.ed-photo{width:80px;height:80px;border-radius:10px;flex-shrink:0;border:.5px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:30px;}
.ed-photo-lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--f3);padding:0 20px;margin-bottom:8px;}
.ed-del-btn{display:block;margin:0 20px;padding:13px;border-radius:10px;background:transparent;border:.5px solid rgba(158,92,92,.3);color:var(--re);font-size:13.5px;text-align:center;cursor:pointer;transition:background .12s;}
.ed-del-btn:active{background:rgba(158,92,92,.08);}

/* ── SEARCH BAR ── */
.srch-wrap{padding:10px 20px;border-bottom:.5px solid var(--ln);}
.srch-inner{position:relative;}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);}
.srch{width:100%;background:var(--s2);border:.5px solid var(--ln);border-radius:10px;padding:9px 14px 9px 36px;color:var(--fg);font-size:13.5px;outline:none;transition:border-color .15s,background .25s;}
.srch::placeholder{color:var(--f4);}
.srch:focus{border-color:var(--ln2);}
.filter-row{display:flex;gap:6px;padding:9px 20px;border-bottom:.5px solid var(--ln);overflow-x:auto;}
.filter-row::-webkit-scrollbar{display:none;}
.fpill{padding:5px 13px;border-radius:7px;border:.5px solid var(--ln2);font-size:11.5px;color:var(--f3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.fpill.on{background:var(--Aub);border-color:var(--AuD);color:var(--Au);}
.empty-msg{padding:40px 20px;text-align:center;color:var(--f4);font-size:13px;}

/* ── WRITE ── */
#write-page{position:absolute;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;animation:pin .2s ease;transition:background .25s;}
.wr-head{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat)+12px) 20px 10px;border-bottom:.5px solid var(--ln);flex-shrink:0;}
.wr-cancel{font-size:13.5px;color:var(--f2);cursor:pointer;padding:4px 0;}
.wr-jsel{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;background:var(--s2);border:.5px solid var(--ln);cursor:pointer;transition:background .12s;}
.wr-jsel:active{background:var(--s3);}
.wr-jdot{width:6px;height:6px;border-radius:50%;}
.wr-jname{font-size:11.5px;color:var(--f2);}
.save-btn{padding:8px 18px;border-radius:8px;background:var(--Au);color:#1a1000;font-size:12.5px;font-weight:600;letter-spacing:.01em;transition:all .15s;}
.save-btn:active{opacity:.85;}
.save-btn.saved{background:var(--gr);}
.wchips{display:flex;gap:6px;padding:9px 20px;border-bottom:.5px solid var(--ln);overflow-x:auto;flex-shrink:0;}
.wchips::-webkit-scrollbar{display:none;}
.wchip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:var(--s2);border:.5px solid var(--ln);font-size:11px;color:var(--f3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .13s;}
.wchip.on{border-color:var(--AuD);color:var(--Au);background:var(--Aub);}
.wchip-dot{width:5px;height:5px;border-radius:50%;}
.wr-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.wr-scroll::-webkit-scrollbar{display:none;}
.wr-title{width:100%;background:transparent;border:none;outline:none;padding:14px 20px 6px;font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;color:var(--fg);line-height:1.2;}
.wr-title::placeholder{color:var(--s4);}
.wr-div{height:.5px;background:var(--ln);margin:0 20px 0;}
.toolbar{display:flex;align-items:center;gap:2px;padding:6px 16px;border-bottom:.5px solid var(--ln);overflow-x:auto;}
.toolbar::-webkit-scrollbar{display:none;}
.tbbtn{width:34px;height:30px;border-radius:7px;background:transparent;color:var(--f3);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.tbbtn:active{background:var(--s3);}
.tbsep{width:.5px;height:18px;background:var(--ln);margin:0 3px;flex-shrink:0;}
.wr-body{width:100%;background:transparent;border:none;outline:none;padding:10px 20px;font-size:15px;color:var(--fg);line-height:1.82;font-weight:300;min-height:180px;}
.wr-body::placeholder{color:var(--f4);}
.wr-footer{display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:.5px solid var(--ln);}
.wc-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);}
.wc-bar-bg{flex:1;height:2px;background:var(--s3);border-radius:99px;overflow:hidden;}
.wc-bar{height:100%;background:var(--Au);border-radius:99px;transition:width .3s;}
.wc-goal{font-size:10px;color:var(--f3);}
.mood-sec{padding:9px 20px;border-top:.5px solid var(--ln);}
.mood-sec-lbl{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--f4);margin-bottom:7px;}
.mood-opts{display:flex;gap:6px;overflow-x:auto;}
.mood-opts::-webkit-scrollbar{display:none;}
.mopt{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:.5px solid var(--ln);background:var(--s2);font-size:12px;color:var(--f2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .13s;}
.mopt.on{border-color:var(--AuD);background:var(--Aub);color:var(--Au);}
.mopt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.photo-sec{padding:10px 20px;border-top:.5px solid var(--ln);}
.photo-sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.photo-lbl{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--f3);}
.padd{padding:4px 11px;border-radius:6px;border:.5px solid var(--AuD);background:var(--Aub);font-size:11px;color:var(--Au);cursor:pointer;}
.photo-strip{display:flex;gap:7px;overflow-x:auto;}
.photo-strip::-webkit-scrollbar{display:none;}
.pthumb{width:74px;height:74px;border-radius:10px;flex-shrink:0;border:.5px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;cursor:pointer;}
.pthumb-add{width:74px;height:74px;border-radius:10px;flex-shrink:0;border:.5px dashed var(--ln2);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;}
.pthumb-add-lbl{font-size:9px;color:var(--f4);letter-spacing:.06em;text-transform:uppercase;}
.prem{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.8);}
.voice-row{display:flex;align-items:center;gap:12px;padding:11px 20px;border-top:.5px solid var(--ln);}
.voice-btn{width:38px;height:38px;border-radius:50%;background:var(--s2);border:.5px solid var(--ln);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.voice-btn.rec{background:rgba(158,92,92,.12);border-color:var(--re);}
.vdot{width:12px;height:12px;border-radius:50%;background:var(--f3);transition:all .2s;}
.vdot.rec{background:var(--re);animation:rdot 1.1s infinite;}
@keyframes rdot{0%,100%{opacity:1}50%{opacity:.35}}
.vi-lbl{font-size:13px;color:var(--fg);}
.vi-sub{font-size:10.5px;color:var(--f3);margin-top:1px;}
.vwaves{display:flex;align-items:center;gap:2px;height:18px;}
.vw{width:2px;border-radius:99px;background:var(--Au);animation:vwa 1s ease-in-out infinite;}
.vw:nth-child(2){animation-delay:.12s}.vw:nth-child(3){animation-delay:.24s}.vw:nth-child(4){animation-delay:.36s}.vw:nth-child(5){animation-delay:.48s}
@keyframes vwa{0%,100%{height:3px}50%{height:16px}}
.wtags{display:flex;gap:5px;flex-wrap:wrap;padding:9px 20px;border-top:.5px solid var(--ln);}
.wtag{padding:4px 11px;border-radius:6px;border:.5px solid var(--ln);background:var(--s2);font-size:11px;color:var(--f3);cursor:pointer;transition:all .13s;}
.wtag.on{border-color:var(--AuD);color:var(--Au);background:var(--Aub);}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 20px 10px;}
.tmpl{padding:11px 12px;background:var(--s2);border:.5px solid var(--ln);border-radius:9px;cursor:pointer;transition:background .12s;}
.tmpl:active{background:var(--s3);}
.tmpl-name{font-size:12.5px;color:var(--fg);font-weight:500;margin-bottom:2px;}
.tmpl-desc{font-size:10.5px;color:var(--f3);line-height:1.4;}
.prompts-wrap{padding:8px 20px 16px;border-top:.5px solid var(--ln);}
.pmt-lbl{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--f4);margin-bottom:6px;}
.pmt{padding:9px 0;border-bottom:.5px solid var(--ln);font-size:13px;color:var(--f2);cursor:pointer;line-height:1.4;transition:color .12s;}
.pmt:last-child{border-bottom:none;padding-bottom:0;}
.pmt:active{color:var(--Au);}

/* ── NOTES ── */

.nc-date{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);margin-top:9px;}
#note-editor{position:absolute;inset:0;background:var(--bg);z-index:110;display:flex;flex-direction:column;animation:pin .2s ease;transition:background .25s;}
.ne-head{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat)+12px) 20px 10px;border-bottom:.5px solid var(--ln);flex-shrink:0;}
.ne-cancel{font-size:13.5px;color:var(--f2);cursor:pointer;}
.ne-del{font-size:13px;color:var(--re);cursor:pointer;}
.ne-save{padding:7px 16px;border-radius:8px;background:var(--Au);color:#1a1000;font-size:12.5px;font-weight:600;cursor:pointer;transition:opacity .15s;}

.ne-title-inp{width:100%;background:transparent;border:none;outline:none;padding:14px 20px 8px;font-family:'Libre Baskerville',serif;font-size:24px;font-weight:400;color:var(--fg);line-height:1.2;}
.ne-title-inp::placeholder{color:var(--s4);}
.ne-body-inp{width:100%;flex:1;background:transparent;border:none;outline:none;padding:0 20px;font-size:14.5px;color:var(--fg);line-height:1.75;font-weight:300;}
.ne-body-inp::placeholder{color:var(--f4);}
.ne-colors{display:flex;align-items:center;gap:7px;padding:11px 20px;border-top:.5px solid var(--ln);flex-shrink:0;}
.ne-clbl{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--f4);margin-right:4px;}
.ncdot{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:all .15s;}
.ncdot.sel{box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px var(--Au);}
.note-fab{position:fixed;bottom:calc(var(--sab) + 88px);right:18px;width:46px;height:46px;border-radius:50%;background:var(--Au);color:#1a1000;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:40;transition:transform .15s;}

/* ── GALLERY ── */
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5px;background:var(--ln);}

/* ── PROGRESS ── */

.cg{aspect-ratio:1;border-radius:6px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--f4);transition:background .25s;}

/* ── SETTINGS ── */
.prof-block{padding:20px;display:flex;align-items:center;gap:14px;border-bottom:.5px solid var(--ln);}
.prof-av{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--AuD),var(--Au));display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:#1a1000;flex-shrink:0;}
.prof-name{font-family:'Libre Baskerville',serif;font-size:21px;font-weight:400;color:var(--fg);}
.prof-plan{font-size:10.5px;color:var(--Au);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.prof-since{font-size:10.5px;color:var(--f4);margin-top:1px;}
.sgrp{margin:14px 0 0;}
.sgrp-lbl{padding:3px 20px 7px;font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--f4);}
.srow{display:flex;align-items:center;gap:11px;padding:12px 20px;border-bottom:.5px solid var(--ln);cursor:pointer;transition:background .12s;}
.srow:last-child{border-bottom:none;}
.srow:active{background:var(--s2);}
.slbl{font-size:13.5px;font-weight:400;color:var(--fg);}
.ssub{font-size:11px;color:var(--f3);margin-top:1px;}
.sright{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.sval{font-size:12px;color:var(--f3);}
.sarr{font-size:16px;color:var(--f4);}
.sbadge{padding:2px 8px;border-radius:4px;font-size:9.5px;font-weight:600;letter-spacing:.05em;}
.sbadge.pro{background:var(--Aub);color:var(--Au);border:.5px solid var(--AuD);}
.sbadge.new{background:rgba(92,158,120,.1);color:var(--gr);border:.5px solid rgba(92,158,120,.3);}
.tgl{width:42px;height:24px;border-radius:99px;background:var(--s4);border:.5px solid var(--ln);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tgl.on{background:var(--Au);border-color:var(--Au);}
.tgl::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--f3);top:2.5px;left:2.5px;transition:all .2s;}

.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 20px;}
.theme-opt{padding:12px 14px;border:.5px solid var(--ln);border-radius:10px;cursor:pointer;transition:all .15s;}
.theme-opt.sel{border-color:var(--Au);background:var(--Aub);}

.theme-opt-name{font-size:13px;font-weight:500;color:var(--fg);}
.theme-check{width:18px;height:18px;border-radius:50%;border:.5px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--Au);}
.theme-check.sel{background:var(--Au);color:#1a1000;border-color:var(--Au);}
.swatch-row{display:flex;gap:4px;}
.swatch{width:16px;height:16px;border-radius:4px;}
.jrow{display:flex;align-items:center;gap:10px;padding:13px 20px;border-bottom:.5px solid var(--ln);cursor:pointer;transition:background .12s;}
.jrow:active{background:var(--s2);}
.jdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.jname{font-size:13.5px;color:var(--fg);}
.jcount{font-size:11px;color:var(--f3);margin-left:auto;}
.signout-btn{display:block;padding:13px 20px;font-size:13.5px;color:var(--re);cursor:pointer;}
.ver-txt{padding:2px 20px 30px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);letter-spacing:.06em;}

/* ── DRAWER ── */
#drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:200;backdrop-filter:blur(4px);animation:dfade .2s ease;}
@keyframes dfade{from{opacity:0}to{opacity:1}}
#drawer{position:absolute;top:0;right:0;bottom:0;width:272px;background:var(--s1);border-left:.5px solid var(--ln);z-index:201;display:flex;flex-direction:column;animation:dslide .25s cubic-bezier(.32,1,.64,1);transition:background .25s;}
@keyframes dslide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drw-profile{padding:calc(var(--sat)+40px) 22px 18px;border-bottom:.5px solid var(--ln);}
.drw-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--AuD),var(--Au));display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;color:#1a1000;margin-bottom:12px;}
.drw-name{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;color:var(--fg);}
.drw-plan{font-size:10.5px;color:var(--Au);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.drw-stats{display:flex;gap:18px;margin-top:12px;}
.drw-sv{font-family:'DM Mono',monospace;font-size:18px;color:var(--fg);}
.drw-sl{font-size:9.5px;color:var(--f3);margin-top:1px;letter-spacing:.06em;}
.drw-nav{flex:1;overflow-y:auto;padding:10px 0;}
.drw-nav::-webkit-scrollbar{display:none;}
.drw-sec{font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--f4);padding:10px 22px 4px;}
.drw-item{display:flex;align-items:center;gap:12px;padding:11px 22px;cursor:pointer;transition:background .12s;}
.drw-item:active{background:var(--s2);}
.drw-item.on{background:var(--Aub);}
.drw-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--f4);transition:background .2s;}
.drw-item.on .drw-dot{background:var(--Au);}
.drw-lbl{font-size:13.5px;color:var(--f2);transition:color .2s;}
.drw-item.on .drw-lbl{color:var(--Au);}
.drw-sep{height:.5px;background:var(--ln);margin:6px 0;}
.drw-footer{padding:14px 22px calc(var(--sab)+18px);border-top:.5px solid var(--ln);}
.drw-signout{font-size:13px;color:var(--re);cursor:pointer;padding:8px 0;}
.drw-ver{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);margin-top:4px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--sab)+88px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--s1);border:.5px solid var(--ln);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--fg);z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

// ─── NAVIGATION ──────────────────────────────
const PAGE_TITLES={home:'Inkwell',journal:'Journal',write:'New Entry',notes:'Notes',gallery:'Gallery',progress:'Progress',insights:'Insights',me:'Profile'};

function navigate(tab){
  S.tab=tab; S.viewingEntry=null;
  document.querySelectorAll('.nt').forEach(n=>{n.classList.toggle('on',n.dataset.tab===tab); const paths=n.querySelectorAll('.nav-stroke'); paths.forEach(p=>p.style.stroke=n.classList.contains('on')?'var(--Au)':'var(--f3)');});
  document.getElementById('topbar-title').textContent=PAGE_TITLES[tab]||tab;
  const tb=document.getElementById('topbar'); tb.classList.toggle('lined',tab!=='home');
  renderPage();
}

// ─── TOAST ───────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ─── RENDER ENGINE ───────────────────────────
function renderPage(){
  const p=document.getElementById('page');
  p.className='pin';
  const actions=document.getElementById('topbar-actions');
  switch(S.tab){
    case 'home': p.innerHTML=renderHome(); break;
    case 'journal': p.innerHTML=renderJournal(); bindJournalEvents(); break;
    case 'notes': p.innerHTML=renderNotes(); bindNoteEvents(); break;
    case 'gallery': p.innerHTML=renderGallery(); break;
    case 'progress': p.innerHTML=renderProgress(); break;
    case 'insights': p.innerHTML=renderInsights(); break;
    case 'me': p.innerHTML=renderMe(); bindMeEvents(); break;
    default: p.innerHTML=renderHome();
  }
  actions.innerHTML=`
    ${S.tab==='journal'?`<div class="icon-btn" onclick="toggleSearch()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8" stroke="var(--f2)"/><path d="m21 21-4.35-4.35" stroke="var(--f2)"/></svg></div>`:''}

      <div class="hl" style="width:18px"></div>
      <div class="hl" style="width:14px"></div>
      <div class="hl" style="width:10px"></div>
    </div>`;
}

// ─── JOURNAL ─────────────────────────────────
function renderJournal(){
  const grouped={};
  const filtered=S.entries.filter(e=>{
    if(S.filter!=='All'){if(S.filter==='Has Photos')return e.photos&&e.photos.length>0;return e.mood===S.filter;}
    if(S.search)return e.title.toLowerCase().includes(S.search.toLowerCase())||e.body.toLowerCase().includes(S.search.toLowerCase());
    return true;
  });
  filtered.forEach(e=>{if(!grouped[e.month])grouped[e.month]=[];grouped[e.month].push(e);});
  const filters=['All','Serene','Proud','Reflective','Heavy','Has Photos'];
  return`
  <div class="srch-wrap"><div class="srch-inner"><div class="srch-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8" stroke="var(--f3)"/><path d="m21 21-4.35-4.35" stroke="var(--f3)"/></svg></div><input class="srch" id="journal-search" placeholder="Search entries…" value="${S.search}" oninput="S.search=this.value;renderPage()"></div></div>
  <div class="filter-row">${filters.map(f=>`<div class="fpill${S.filter===f?' on':''}" onclick="S.filter='${f}';renderPage()">${f}</div>`).join('')}</div>
  ${Object.keys(grouped).length===0?`<div class="empty-msg">No entries found.<br><span style="color:var(--Au);cursor:pointer" onclick="openWrite()">Write your first entry →</span></div>`:''}
  ${Object.entries(grouped).map(([month,entries])=>`<div class="mdlabel">${month}</div><div class="block">${entries.map(e=>renderEitem(e)).join('')}</div>`).join('')}
  `;
}

function bindJournalEvents(){
  document.querySelectorAll('.eitem').forEach(el=>el.addEventListener('click',()=>{const id=parseInt(el.getAttribute('onclick').match(/\d+/)[0]);viewEntry(id);}));
}

function toggleSearch(){document.getElementById('journal-search')?.focus();}

function viewEntry(id){
  const e=S.entries.find(x=>x.id===id); if(!e)return;

  const screen=document.getElementById('screen');

    <div class="ed-head">
      <div class="ed-back" onclick="closeEntryDetail()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7" stroke="var(--Au)"/></svg> Journal</div>

    </div>

function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;

}

function renderPhotoStrip(){
  const ws=writeState;
  return ws.photos.map((p,i)=>`<div class="pthumb" style="background:${p.bg}">${p.e}<div class="prem" onclick="removePhoto(${i})">✕</div></div>`).join('')+
  `<div class="pthumb-add" onclick="addPhoto()"><div style="font-size:18px;color:var(--f4)">📷</div><div class="pthumb-add-lbl">Camera</div></div>
   <div class="pthumb-add" onclick="addPhoto()"><div style="font-size:16px;color:var(--f4)">▣</div><div class="pthumb-add-lbl">Library</div></div>`;
}

function renderTagsWrite(){
  return TAGS_ALL.map(t=>`<div class="wtag${writeState.tags.includes(t)?' on':''}" onclick="toggleTag('${t}')">${t}</div>`).join('');
}

function addPhoto(){
  const p=PHOTO_OPTIONS[Math.floor(Math.random()*PHOTO_OPTIONS.length)];
  writeState.photos.push(p);
  const strip=document.getElementById('photo-strip'); if(strip)strip.innerHTML=renderPhotoStrip();
}

function removePhoto(i){writeState.photos.splice(i,1);const strip=document.getElementById('photo-strip');if(strip)strip.innerHTML=renderPhotoStrip();}

function cycleJournal(){
  const i=JOURNALS_DATA.indexOf(writeState.journal);
  writeState.journal=JOURNALS_DATA[(i+1)%JOURNALS_DATA.length];
  document.getElementById('wr-jdot').style.background=writeState.journal.color;
  document.getElementById('wr-jname').textContent=writeState.journal.name;
}

function selectMood(label,color){
  writeState.mood=label;
  document.querySelectorAll('.mopt').forEach(m=>{m.classList.toggle('on',m.textContent.trim()===label);});
  const chips=document.querySelector('.wchips');
  if(chips){
    let mc=document.getElementById('mood-chip');
    if(!mc){mc=document.createElement('div');mc.id='mood-chip';mc.className='wchip on';mc.setAttribute('onclick','clearMood()');chips.insertBefore(mc,chips.children[1]);}
    mc.innerHTML=`<div class="wchip-dot" style="background:${color}"></div>${label}`;
  }
}

function clearMood(){writeState.mood=null;document.getElementById('mood-chip')?.remove();document.querySelectorAll('.mopt').forEach(m=>m.classList.remove('on'));}

function toggleTag(t){
  const i=writeState.tags.indexOf(t);
  if(i>=0)writeState.tags.splice(i,1);else writeState.tags.push(t);
  const el=document.querySelectorAll('.wtag');
  el.forEach(el=>{if(el.textContent===t)el.classList.toggle('on',writeState.tags.includes(t));});
}

function insertFmt(pre,post){
  const ta=document.getElementById('wr-body'); if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  const sel=v.substring(s,e);
  ta.value=v.substring(0,s)+pre+sel+post+v.substring(e);
  ta.selectionStart=s+pre.length; ta.selectionEnd=e+pre.length;
  writeState.body=ta.value; ta.focus();
}

function insertPrompt(p){const ta=document.getElementById('wr-body');if(!ta)return;const b=ta.value;ta.value=b+(b&&!b.endsWith('\n')?'\n\n':'')+p+' ';writeState.body=ta.value;ta.focus();}
function insertTemplate(n){insertPrompt(`[${n}]\n`);}

function toggleRecording(){
  writeState.recording=!writeState.recording;
  const btn=document.getElementById('voice-btn');const dot=document.getElementById('vdot');
  const lbl=document.getElementById('vi-lbl');const sub=document.getElementById('vi-sub');const waves=document.getElementById('vwaves-wrap');
  if(btn)btn.classList.toggle('rec',writeState.recording);
  if(dot)dot.classList.toggle('rec',writeState.recording);
  if(lbl)lbl.textContent=writeState.recording?'Recording…':'Voice note';
  if(sub)sub.textContent=writeState.recording?'Tap to stop':'Record a voice memo';
  if(waves)waves.innerHTML=writeState.recording?'<div class="vwaves"><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div></div>':'';
}

function saveEntry(){
  const ws=writeState;
  const title=document.getElementById('wr-title')?.value||ws.title;
  const body=document.getElementById('wr-body')?.value||ws.body;
  if(!title.trim()&&!body.trim()){showToast('Write something first');return;}
  const words=body.trim()?body.trim().split(/\s+/).length:0;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
  const month=now.toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase();
  const moodData=MOODS.find(m=>m.l===ws.mood);
  const entry={
    id:Date.now(),date:dateStr,month,
    title:title||'Untitled',body:body||'',
    mood:ws.mood||'',moodColor:moodData?.c||'#888',
    words,tags:ws.tags,photos:ws.photos,
    journal:ws.journal.id,
    location:'',weather:''
  };
  S.entries.unshift(entry); save();
  const btn=document.getElementById('wr-save-btn');

function openNoteEditor(id){
  const n=id?S.notes.find(x=>x.id===id):null;

  let ed=document.getElementById('note-editor'); if(ed)ed.remove();

function selectNoteAccent(c){
  document.querySelectorAll('.ncdot').forEach(d=>d.classList.remove('sel'));
  document.getElementById('ncdot-'+c.replace('#',''))?.classList.add('sel');
  document.getElementById('ne-accent-bar').style.background=c;
  document.getElementById('note-editor')._accent=c;
}

function saveNote(existingId){
  const title=document.getElementById('ne-title')?.value||'';
  const body=document.getElementById('ne-body')?.value||'';
  const accent=document.getElementById('note-editor')._accent||NC_ACCENTS[0];
  if(!title.trim()&&!body.trim()){showToast('Write something first');return;}
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
  if(existingId){S.notes=S.notes.map(n=>n.id===existingId?{...n,title,body,accent}:n);}
  else{S.notes.unshift({id:Date.now(),title:title||'Untitled',body,date:dateStr,pinned:false,accent});}
  save(); closeNoteEditor(); renderPage(); showToast('Note saved');
}

function deleteNote(id){
  if(!confirm('Delete this note?'))return;
  S.notes=S.notes.filter(n=>n.id!==id); save(); closeNoteEditor(); renderPage(); showToast('Note deleted');
}

function closeNoteEditor(){document.getElementById('note-editor')?.remove();}

  else if(document.getElementById('note-editor'))closeNoteEditor();
  else if(document.getElementById('entry-detail'))closeEntryDetail();
  else if(document.getElementById('drawer'))closeDrawer();
});

// Prevent pull-to-refresh
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
</script>
</body>
</html>
