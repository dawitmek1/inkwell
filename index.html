<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Inkwell"/>
<meta name="theme-color" content="#0a0a0c" id="tcm"/>
<title>Inkwell Journal</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230a0a0c'/%3E%3Ctext x='90' y='122' font-size='108' text-anchor='middle' fill='%23c8914e'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

/* ─── THEMES ─── */
:root {
  --bg:#0a0a0c; --s1:#111115; --s2:#18181e; --s3:#202028; --s4:#2a2a35;
  --ln:#24242e; --ln2:#32323e;
  --Au:#c8914e; --AuL:#e0aa68; --AuD:#7a5830; --Aub:rgba(200,145,78,.12);
  --fg:#ede8e0; --f2:#9896a2; --f3:#585664; --f4:#383644;
  --gr:#5a9e74; --bl:#5a7e9e; --re:#9e5a5a; --pu:#7a5c9e;
  --nb:rgba(10,10,14,.96);
}
[data-t=light]{
  --bg:#f4f2ee; --s1:#fff; --s2:#ede9e3; --s3:#e4dfd8; --s4:#d8d2c8;
  --ln:#e0dbd2; --ln2:#ccc6bc;
  --Au:#9e6e38; --AuD:#7a5428; --Aub:rgba(158,110,56,.1);
  --fg:#1c1a16; --f2:#5c5850; --f3:#8a8680; --f4:#aca8a2;
  --gr:#3a7e58; --bl:#3a5e7e; --re:#7e3a3a; --nb:rgba(244,242,238,.96);
}
[data-t=sepia]{
  --bg:#1c1710; --s1:#241e14; --s2:#2c261a; --s3:#342e22; --s4:#3e362a;
  --ln:#3a3228; --ln2:#4a4238;
  --Au:#c8a060; --AuD:#8a6c2e; --Aub:rgba(200,160,96,.1);
  --fg:#f0e8d8; --f2:#b0a898; --f3:#706858; --f4:#504840;
  --gr:#6a9e78; --bl:#6a8e9e; --re:#9e6a5a; --nb:rgba(28,23,16,.96);
}
[data-t=midnight]{
  --bg:#060812; --s1:#0c0e1c; --s2:#121628; --s3:#181e34; --s4:#20263e;
  --ln:#1e2434; --ln2:#28304a;
  --Au:#8a9ee0; --AuD:#5a6aaa; --Aub:rgba(138,158,224,.1);
  --fg:#dce0f4; --f2:#8890aa; --f3:#505872; --f4:#343854;
  --gr:#5a9e8a; --bl:#5a7eaa; --re:#9e5a6c; --nb:rgba(6,8,18,.96);
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--fg);transition:background .25s,color .25s;}
input,textarea,button,select{font-family:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}
textarea{resize:none;}

/* ─── SHELL ─── */
#app{
  position:fixed;
  /* inset:0 does NOT work for us — we want the nav to sit at the real bottom */
  top:0; left:0; right:0; bottom:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ─── TOP BAR ─── */
#tb{
  display:flex;align-items:center;gap:8px;
  /* Push below status bar / notch / Dynamic Island */
  padding:max(env(safe-area-inset-top),44px) 18px 10px;
  background:var(--bg);
  border-bottom:1px solid transparent;
  flex-shrink:0;z-index:60;
  transition:border-color .2s,background .25s;
}
#tb.lined{border-bottom-color:var(--ln);}
#tb-title{flex:1;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tb-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ham{display:flex;flex-direction:column;gap:5px;width:40px;height:40px;justify-content:center;align-items:flex-start;border-radius:10px;padding:0 10px;transition:background .12s;flex-shrink:0;}
.ham:active{background:var(--s3);}
.hl{height:1.5px;background:var(--f2);border-radius:99px;}
.ib{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .12s;color:var(--f2);flex-shrink:0;}
.ib:active{background:var(--s3);}

/* ─── SCREEN ─── */
#screen{flex:1;position:relative;overflow:hidden;}

/* Scrollable page area — bottom padding must clear the nav */
#page{
  position:absolute;top:0;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  /* 58px = nav tab row, env() = home indicator on iPhone */
  padding-bottom:calc(58px + env(safe-area-inset-bottom) + 16px);
}
#page::-webkit-scrollbar{display:none;}

/* ─── BOTTOM NAV ───
   Key fix: use a REAL fixed footer approach — flex child, no position:fixed,
   padding-bottom covers the home indicator on iPhones, zero on Android. */
#bnav{
  display:flex;
  align-items:center;
  
  background:var(--nb);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--ln);
  flex-shrink:0;
  z-index:60;
  transition:background .25s,border-color .25s;
}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;user-select:none;transition:opacity .1s;}
.nt:active{opacity:.6;}
.nt svg{display:block;transition:stroke .2s;}
.nt-l{font-size:9.5px;font-weight:500;letter-spacing:.03em;color:var(--f3);transition:color .2s;}
.nt.on .nt-l{color:var(--Au);}
.nt-p{width:3px;height:3px;border-radius:50%;background:var(--Au);opacity:0;transition:opacity .2s;margin-top:1px;}
.nt.on .nt-p{opacity:1;}

/* ─── ANIMATIONS ─── */
.fade{animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.su{animation:su .26s cubic-bezier(.32,1,.64,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sl{animation:sl .25s cubic-bezier(.32,1,.64,1);}
@keyframes sl{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* ─── DRAWER ─── */
#dbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;backdrop-filter:blur(6px);animation:fade .18s;}
#drw{
  position:fixed;top:0;left:0;bottom:0;width:min(288px,82vw);
  background:var(--s1);border-right:1px solid var(--ln);
  z-index:201;display:flex;flex-direction:column;
  animation:sl .25s cubic-bezier(.32,1,.64,1);
  transition:background .25s;
}
.dtop{
  padding:max(env(safe-area-inset-top),44px) 22px 18px;
  border-bottom:1px solid var(--ln);
}
.dav{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--AuD),var(--Au));display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:#1a1000;margin-bottom:12px;margin-top:6px;}
.dname{font-family:'Libre Baskerville',serif;font-size:21px;color:var(--fg);}
.dplan{font-size:11px;color:var(--Au);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.dstats{display:flex;gap:18px;margin-top:12px;}
.dsv{font-family:'DM Mono',monospace;font-size:19px;color:var(--fg);line-height:1;}
.dsl{font-size:9.5px;color:var(--f3);margin-top:2px;letter-spacing:.06em;}
.dnav{flex:1;overflow-y:auto;padding:10px 0;}
.dnav::-webkit-scrollbar{display:none;}
.di{display:flex;align-items:center;gap:13px;padding:12px 22px;cursor:pointer;transition:background .12s;}
.di:active{background:var(--s2);}
.di.on{background:var(--Aub);}
.di-ico{width:18px;text-align:center;font-size:14px;color:var(--f3);}
.di.on .di-ico{color:var(--Au);}
.di-l{font-size:13.5px;color:var(--f2);}
.di.on .di-l{color:var(--Au);}
.dsep{height:1px;background:var(--ln);margin:7px 0;}
.dfoot{padding:14px 22px;padding-bottom:max(env(safe-area-inset-bottom),16px);border-top:1px solid var(--ln);}
.dso{font-size:13px;color:var(--re);cursor:pointer;padding:7px 0;}
.dver{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);margin-top:6px;}

/* ─── PANELS (full-screen overlays) ─── */
.panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transition:background .25s;}
.ph{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:max(env(safe-area-inset-top),44px) 18px 12px;
  border-bottom:1px solid var(--ln);
  flex-shrink:0;background:var(--bg);
  transition:background .25s;
}
.ph-lft{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--Au);font-size:13.5px;font-weight:500;cursor:pointer;flex-shrink:0;min-height:44px;}
.ph-title{font-family:'Libre Baskerville',serif;font-size:18px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ph-rgt{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(env(safe-area-inset-bottom),20px);}
.pscroll::-webkit-scrollbar{display:none;}

/* Buttons */
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;min-height:38px;}
.btn-p{background:var(--Au);color:#1a1000;}
.btn-p:active{opacity:.85;}
.btn-p.ok{background:var(--gr);}
.btn-g{background:transparent;color:var(--f2);border:1px solid var(--ln);}
.btn-d{background:transparent;color:var(--re);border:1px solid rgba(158,90,90,.3);}

/* ─── LAYOUT UTILS ─── */
.blk{background:var(--s1);border-top:1px solid var(--ln);border-bottom:1px solid var(--ln);margin-bottom:2px;transition:background .25s;}
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 6px;}
.sl2{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);}
.slink{font-size:12px;color:var(--Au);font-weight:500;cursor:pointer;}
.mdl{padding:13px 20px 5px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);letter-spacing:.12em;text-transform:uppercase;}
.empty{text-align:center;padding:60px 24px;color:var(--f4);font-size:14px;line-height:2;}
.empty a{color:var(--Au);cursor:pointer;}

/* ─── SPLASH SCREEN ─── */
#splash{
  position:fixed;inset:0;z-index:900;
  background:#0a0a0c;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  pointer-events:none;
}
#splash.hide{
  animation:splashOut .55s cubic-bezier(.4,0,1,1) forwards;
}
@keyframes splashOut{
  0%{opacity:1;transform:scale(1);}
  60%{opacity:1;transform:scale(1.04);}
  100%{opacity:0;transform:scale(1.08);}
}
.splash-mark{
  font-family:'Libre Baskerville',serif;
  font-size:72px;
  color:#c8914e;
  line-height:1;
  animation:splashMarkIn .7s cubic-bezier(.34,1.56,.64,1) .1s both;
  letter-spacing:-.02em;
}
@keyframes splashMarkIn{
  from{opacity:0;transform:scale(.6);}
  to{opacity:1;transform:scale(1);}
}
.splash-name{
  font-family:'Libre Baskerville',serif;
  font-size:28px;
  font-weight:400;
  color:#ede8e0;
  letter-spacing:.08em;
  margin-top:16px;
  animation:splashNameIn .6s ease .4s both;
}
@keyframes splashNameIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.splash-tagline{
  font-size:12px;
  color:#585664;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-top:6px;
  animation:splashNameIn .6s ease .6s both;
}

/* ─── LOCK SCREEN ─── */
#lock{
  position:fixed;inset:0;z-index:500;
  /* Layered background for depth */
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;
  /* Top section: logo + time. Bottom section: keypad */
  padding-top:max(env(safe-area-inset-top),44px);
  padding-bottom:max(env(safe-area-inset-bottom),24px);
  overflow:hidden;
}
/* Subtle radial glow behind everything */
#lock::before{
  content:'';
  position:absolute;
  top:-20%;left:50%;
  transform:translateX(-50%);
  width:340px;height:340px;
  background:radial-gradient(circle,rgba(200,145,78,.1) 0%,transparent 70%);
  pointer-events:none;
}

/* Top area (logo + time + dots) */
.lock-top{
  display:flex;flex-direction:column;align-items:center;
  flex:1;justify-content:center;
  padding-bottom:20px;
}
.lock-wordmark{
  font-family:'Libre Baskerville',serif;
  font-size:22px;
  font-weight:400;
  color:var(--f3);
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-bottom:32px;
}
.lock-time{
  font-family:'DM Mono',monospace;
  font-size:72px;
  font-weight:400;
  color:var(--fg);
  line-height:1;
  letter-spacing:-.03em;
}
.lock-date{
  font-size:15px;
  color:var(--f2);
  margin-top:8px;
  letter-spacing:.04em;
}
.lock-label{
  font-size:13px;
  color:var(--f3);
  margin-top:32px;
  letter-spacing:.04em;
}

/* PIN dots */
.lock-dots{
  display:flex;gap:18px;
  margin-top:14px;
}
.ldot{
  width:12px;height:12px;
  border-radius:50%;
  background:transparent;
  border:1.5px solid var(--f3);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.ldot.filled{
  background:var(--Au);
  border-color:var(--Au);
  transform:scale(1.15);
}

/* Bottom keypad area */
.lock-pad-wrap{
  width:100%;
  padding:0 32px;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}
.lock-pad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  width:100%;
  max-width:300px;
}
.lkey{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:74px;
  border-radius:18px;
  background:var(--s2);
  border:1px solid var(--ln);
  cursor:pointer;
  transition:all .12s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  overflow:hidden;
}
.lkey::after{
  content:'';
  position:absolute;inset:0;
  background:var(--fg);
  opacity:0;
  border-radius:inherit;
  transition:opacity .08s;
}
.lkey:active::after{opacity:.06;}
.lkey:active{transform:scale(.95);}
.lkey.empty{background:transparent;border-color:transparent;cursor:default;}
.lkey.empty:active{transform:none;}
.lkey.empty::after{display:none;}
.lkey-num{
  font-family:'DM Mono',monospace;
  font-size:26px;
  font-weight:400;
  color:var(--fg);
  line-height:1;
}
.lkey-letters{
  font-size:9px;
  color:var(--f3);
  letter-spacing:.14em;
  margin-top:3px;
  font-weight:500;
}
.lock-del-btn{
  display:flex;align-items:center;justify-content:center;
  height:74px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.lock-del-btn:active{opacity:.5;}
.lock-del-ico{
  font-size:24px;
  color:var(--f2);
  /* Custom backspace using CSS — cleaner than emoji */
}
.lock-msg{
  font-size:13px;
  color:var(--re);
  min-height:22px;
  margin-top:14px;
  text-align:center;
  letter-spacing:.02em;
  animation:none;
}
.lock-msg.shake{animation:shake .4s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
.lock-forgot{
  font-size:13px;
  color:var(--f3);
  cursor:pointer;
  padding:12px;
  margin-top:4px;
  letter-spacing:.02em;
}
.lock-forgot:active{color:var(--Au);}

/* Setup PIN header */
.lock-setup-header{
  text-align:center;
  margin-bottom:24px;
}
.lock-setup-title{
  font-family:'Libre Baskerville',serif;
  font-size:26px;
  color:var(--fg);
  margin-bottom:6px;
}
.lock-setup-sub{
  font-size:13px;
  color:var(--f3);
  letter-spacing:.02em;
}

/* ─── HOME ─── */
.hero{padding:20px 20px 0;}
.hero-date{font-size:11px;color:var(--f3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
.hero-name{font-family:'Libre Baskerville',serif;font-size:33px;font-weight:400;color:var(--fg);line-height:1.1;letter-spacing:-.01em;}
.hero-name em{font-style:italic;color:var(--Au);}
.scards{display:flex;gap:8px;padding:14px 20px 0;}
.sc{flex:1;background:var(--s1);border:1px solid var(--ln);border-radius:13px;padding:12px 8px;text-align:center;position:relative;overflow:hidden;transition:background .25s;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.a::before{background:linear-gradient(90deg,var(--Au),transparent);}
.sc.b::before{background:linear-gradient(90deg,var(--gr),transparent);}
.sc.c::before{background:linear-gradient(90deg,var(--bl),transparent);}
.sc.d::before{background:linear-gradient(90deg,var(--pu),transparent);}
.scv{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;line-height:1;}
.sc.a .scv{color:var(--Au);}.sc.b .scv{color:var(--gr);}.sc.c .scv{color:var(--bl);}.sc.d .scv{color:var(--pu);}
.scl{font-size:9px;color:var(--f3);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
.act-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;}
.ag{aspect-ratio:1;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8.5px;color:var(--f4);}
.ag.w{background:var(--Aub);color:var(--Au);}
.ag.td{background:var(--Au);color:#1a1000;font-weight:700;}
.qcard{margin:14px 20px 0;padding:14px 0;border-top:1px solid var(--ln);border-bottom:1px solid var(--ln);}
.qt{font-family:'Libre Baskerville',serif;font-size:15px;font-style:italic;color:var(--f2);line-height:1.65;}
.qa{font-size:10px;color:var(--f3);margin-top:7px;letter-spacing:.08em;}
.otd{margin:14px 20px 0;background:var(--s1);border:1px solid var(--ln);border-left:3px solid var(--Au);border-radius:0 13px 13px 0;padding:14px 16px;cursor:pointer;transition:background .12s;}
.otd:active{background:var(--s2);}
.otd-e{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--Au);margin-bottom:5px;}
.otd-t{font-family:'Libre Baskerville',serif;font-size:16.5px;color:var(--fg);line-height:1.3;margin-bottom:4px;}
.otd-p{font-size:12.5px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.otd-m{font-family:'DM Mono',monospace;font-size:10px;color:var(--f3);margin-top:7px;}

/* ─── ENTRY ITEM ─── */
.ei{padding:14px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.ei:last-child{border-bottom:none;}
.ei:active{background:var(--s2);}
.ei-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ei-l{display:flex;align-items:center;gap:7px;}
.eidot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.eidate{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);letter-spacing:.04em;}
.eimeta{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);}
.eititle{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;color:var(--fg);line-height:1.2;margin-bottom:4px;}
.eiprev{font-size:13px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.to-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.to-n{font-size:13.5px;font-weight:500;color:var(--fg);}
.tchk{width:19px;height:19px;border-radius:50%;border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--Au);}
.tchk.sel{background:var(--Au);color:#1a1000;border-color:var(--Au);}
.tsw{display:flex;gap:5px;}
.tsw-d{width:17px;height:17px;border-radius:5px;border:1px solid rgba(128,128,128,.2);}
.jrow{display:flex;align-items:center;gap:11px;padding:13px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;min-height:50px;}
.jrow:active{background:var(--s2);}
.jdot2{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.jnm2{font-size:14px;color:var(--fg);}
.jcnt{font-size:11.5px;color:var(--f3);margin-left:auto;}
.signout{display:block;padding:14px 20px;font-size:14px;color:var(--re);cursor:pointer;}
.ver{padding:2px 20px 36px;font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);letter-spacing:.07em;}

/* ─── PHOTO VIEWER ─── */
#pv{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:500;display:flex;align-items:center;justify-content:center;padding:max(env(safe-area-inset-top),44px) 20px max(env(safe-area-inset-bottom),20px);animation:fade .18s;}
#pv img{max-width:100%;max-height:100%;object-fit:contain;}
#pv-x{position:absolute;top:max(env(safe-area-inset-top),44px);right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ─── BOTTOM SHEET ─── */
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;backdrop-filter:blur(6px);display:flex;align-items:flex-end;animation:fade .18s;}
.msheet{width:100%;max-height:72vh;background:var(--s1);border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:su .24s ease;}
.msh-h{padding:14px 20px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.msh-t{font-family:'Libre Baskerville',serif;font-size:17px;color:var(--fg);}
.msh-x{width:28px;height:28px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--f2);}
.msh-body{overflow-y:auto;flex:1;padding-bottom:max(env(safe-area-inset-bottom),16px);}
.msh-body::-webkit-scrollbar{display:none;}
.msh-it{padding:13px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.msh-it:last-child{border-bottom:none;}
.msh-it:active{background:var(--s2);}
.msh-in{font-size:14px;font-weight:500;color:var(--fg);margin-bottom:3px;}
.msh-id{font-size:12px;color:var(--f3);}

/* ─── TOAST ─── */
#toast{
  position:fixed;left:50%;
  bottom:calc(58px + env(safe-area-inset-bottom) + 12px);
  transform:translateX(-50%) translateY(10px);
  background:var(--s1);border:1px solid var(--ln);border-radius:12px;
  padding:11px 20px;font-size:13.5px;color:var(--fg);
  z-index:999;opacity:0;transition:all .26s;pointer-events:none;
  white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.35);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── ONBOARDING ─── */
#onboard{
  position:fixed;inset:0;z-index:600;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:max(env(safe-area-inset-top),44px) 36px max(env(safe-area-inset-bottom),36px);
  text-align:center;
  animation:fade .4s ease;
}
#onboard::before{
  content:'';
  position:absolute;
  bottom:-10%;left:50%;
  transform:translateX(-50%);
  width:360px;height:360px;
  background:radial-gradient(circle,rgba(200,145,78,.07) 0%,transparent 70%);
  pointer-events:none;
}
.ob-mark{
  font-family:'Libre Baskerville',serif;
  font-size:56px;
  color:var(--Au);
  line-height:1;
  margin-bottom:10px;
  animation:splashMarkIn .6s cubic-bezier(.34,1.56,.64,1) .1s both;
}
.ob-wordmark{
  font-family:'Libre Baskerville',serif;
  font-size:36px;
  font-weight:400;
  color:var(--fg);
  letter-spacing:.04em;
  margin-bottom:10px;
}
.ob-tagline{
  font-size:12px;
  color:var(--f3);
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:52px;
}
.ob-inp-wrap{width:100%;max-width:300px;position:relative;margin-bottom:14px;}
.ob-inp{
  width:100%;
  background:var(--s2);
  border:1px solid var(--ln);
  border-radius:14px;
  padding:16px 20px;
  font-size:17px;
  color:var(--fg);
  outline:none;
  text-align:center;
  transition:border-color .2s;
  letter-spacing:.02em;
}
.ob-inp::placeholder{color:var(--f4);}
.ob-inp:focus{border-color:var(--Au);}
.ob-btn{
  width:100%;max-width:300px;
  padding:16px;
  border-radius:14px;
  background:var(--Au);
  color:#1a1000;
  font-size:16px;
  font-weight:600;
  cursor:pointer;border:none;
  transition:opacity .15s;
  margin-bottom:14px;
  letter-spacing:.02em;
}
.ob-btn:active{opacity:.85;}
.ob-note{
  font-size:12px;
  color:var(--f4);
  line-height:1.6;
  max-width:240px;
  letter-spacing:.02em;
}
</style>
</head>

  <div class="splash-mark">✦</div>

</div>

<div id="app">
  <div id="tb">
    <button class="ham" onclick="openDrw()">
      <div class="hl" style="width:20px"></div>

        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
      </svg>
      <span class="nt-l">Notes</span><div class="nt-p"></div>
    </div>
    <div class="nt" data-tab="me" onclick="go('me')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">

      </svg>
      <span class="nt-l">Me</span><div class="nt-p"></div>
    </div>
  </nav>
</div>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════
const DB = {
  get(k, d) { try { const v = localStorage.getItem('iw_' + k); return v != null ? JSON.parse(v) : d; } catch { return d; } },
  set(k, v) { try { localStorage.setItem('iw_' + k, JSON.stringify(v)); } catch { toast('Storage full — export your data'); } }
};

// ════════════════════════════════════════════════
//  STATE — all fresh, no default sample data
// ════════════════════════════════════════════════
let A = {
  tab: 'home',
  theme: DB.get('theme', 'dark'),
  settings: DB.get('settings', { rem: true, streak: true, weekly: false, faceID: false, enc: true, priv: false }),
  entries: DB.get('entries', []),
  notes: DB.get('notes', []),
  name: DB.get('name', ''),
  goal: DB.get('goal', 500),
  pin: DB.get('pin', ''),         // 4-digit lock PIN
  joined: DB.get('joined', ''),   // ISO date string
  filt: 'All', nFilt: 'All', search: '',
};

let WS = {}, NS = {}, REC = { stream: null, rec: null, chunks: [], t0: null, dur: 0, timer: null };

function save() {
  DB.set('entries', A.entries);
  DB.set('notes', A.notes);
  DB.set('settings', A.settings);
}

// ════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════
const JOURNALS = [
  { id: 'daily', name: 'Daily', c: '#c8914e' },
  { id: 'travel', name: 'Travel', c: '#5c7e9e' },
  { id: 'dreams', name: 'Dreams', c: '#7a5c9e' },
  { id: 'gratitude', name: 'Gratitude', c: '#5a9e74' },
];
const MOODS = [
  { l: 'Serene', c: '#5c7e9e' }, { l: 'Grateful', c: '#c8914e' }, { l: 'Proud', c: '#5a9e74' },
  { l: 'Reflective', c: '#7a5c9e' }, { l: 'Heavy', c: '#6a6870' }, { l: 'Anxious', c: '#9e7c5c' },
  { l: 'Strong', c: '#5a9e72' }, { l: 'Low', c: '#7c5c5c' }, { l: 'Content', c: '#5c8e7c' }, { l: 'Hopeful', c: '#7c9e5c' },
];
const TAGS = ['work', 'family', 'health', 'growth', 'gratitude', 'mindfulness', 'books', 'nature', 'fitness', 'rest', 'reflection', 'win', 'travel', 'creative', 'sleep', 'therapy'];
const NC_ACC = ['#c8914e', '#5a9e74', '#7a5c9e', '#5c7e9e', '#9e7c5c', '#5c8a9e', '#9e5c5c', '#7a8a5a'];
const TEMPLATES = [
  { n: 'Morning Pages', d: 'Free-form stream of consciousness', t: '[Morning Pages]\n\nRight now I\'m thinking about...\n\n' },
  { n: 'Gratitude', d: 'Three things I\'m grateful for', t: '[Gratitude]\n\n1. \n2. \n3. \n\nWhy it matters:\n\n' },
  { n: 'Daily Review', d: 'Wins, lessons, tomorrow', t: '[Daily Review]\n\nWins:\n• \n\nLearned:\n• \n\nTomorrow:\n• \n\n' },
  { n: 'Therapy Notes', d: 'Feelings, patterns, insights', t: '[Therapy Notes]\n\nFeeling:\n\nPattern:\n\nInsight:\n\n' },
  { n: 'Problem Solving', d: 'Explore a challenge deeply', t: '[Problem Solving]\n\nThe problem:\n\nApproaches:\n1. \n2. \n3. \n\nBest path:\n\n' },
  { n: 'Weekly Review', d: 'Reflect on the whole week', t: '[Weekly Review]\n\nHighlights:\n• \n\nChallenges:\n• \n\nDo differently:\n\nNext week:\n\n' },
];
const PROMPTS = [
  'What made today worth remembering?',
  'What am I carrying right now that I should put down?',
  'What do I want to let go of?',
  'What surprised me today?',
  'What am I genuinely proud of?',
  'What would I tell my past self?',
  'What feels unresolved and why?',
  'What am I avoiding — and what happens if I stop?',
  'What brought me peace today?',
  'What would "enough" look like right now?',
];
const TC = { dark: '#0a0a0c', light: '#f4f2ee', sepia: '#1c1710', midnight: '#060812' };
const PT = { home: 'Inkwell', journal: 'Journal', write: 'New Entry', notes: 'Notes', gallery: 'Gallery', progress: 'Progress', insights: 'Insights', me: 'Profile' };

// ════════════════════════════════════════════════
//  THEME
// ════════════════════════════════════════════════
function setTheme(t) {
  document.documentElement.setAttribute('data-t', t);
  document.getElementById('tcm').content = TC[t] || '#0a0a0c';
  A.theme = t;
  DB.set('theme', t);
}

// ════════════════════════════════════════════════
//  ONBOARDING (first launch)
// ════════════════════════════════════════════════
function showOnboard() {
  const d = document.createElement('div');
  d.id = 'onboard';
  d.innerHTML = `
    <div class="ob-mark">✦</div>
    <div class="ob-wordmark">Inkwell</div>
    <div class="ob-tagline">Your private journal</div>
    <div class="ob-inp-wrap">
      <input class="ob-inp" id="ob-name" placeholder="What's your name?" maxlength="30" autocomplete="off" autocorrect="off">
    </div>
    <button class="ob-btn" onclick="finishOnboard()">Begin journaling</button>
    <div class="ob-note">Everything stays on your device.<br>Private by default. Export anytime.</div>
  `;
  document.body.appendChild(d);
  setTimeout(() => {
    const inp = document.getElementById('ob-name');
    if (inp) inp.focus();
  }, 400);
  // Allow pressing Enter to continue
  setTimeout(() => {
    document.getElementById('ob-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') finishOnboard(); });
  }, 450);
}

function finishOnboard() {
  const n = document.getElementById('ob-name')?.value?.trim() || 'Friend';
  A.name = n;
  A.joined = new Date().toISOString();
  DB.set('name', A.name);
  DB.set('joined', A.joined);
  document.getElementById('onboard')?.remove();
  go('home');
}

// ════════════════════════════════════════════════
//  LOCK SCREEN
// ════════════════════════════════════════════════
let lockInput = '';

function getLockTime() {
  const n = new Date();
  return n.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function getLockDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function showLock(onSuccess) {
  const isSetup = !A.pin;
  const d = document.createElement('div');
  d.id = 'lock';
  d._onSuccess = onSuccess;
  d._isSetup = isSetup;
  d._confirm = '';
  lockInput = '';

  const keyRows = [
    [1, 2, 3],
    [4, 5, 6],
    [7, 8, 9],
    [null, 0, '⌫'],
  ];
  const letters = { 2: 'ABC', 3: 'DEF', 4: 'GHI', 5: 'JKL', 6: 'MNO', 7: 'PQRS', 8: 'TUV', 9: 'WXYZ' };

  const padHTML = keyRows.map(row => row.map(k => {
    if (k === null) return `<div class="lkey empty"></div>`;
    if (k === '⌫') return `<div class="lock-del-btn" onclick="lockDel()">
      <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
        <path d="M10 2H26C27.1 2 28 2.9 28 4V16C28 17.1 27.1 18 26 18H10L2 10L10 2Z" stroke="var(--f2)" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
        <path d="M17 7L23 13M23 7L17 13" stroke="var(--f2)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>`;
    return `<div class="lkey" onclick="lockTap('${k}')">
      <div class="lkey-num">${k}</div>
      ${letters[k] ? `<div class="lkey-letters">${letters[k]}</div>` : ''}
    </div>`;
  }).join('')).join('');

  if (isSetup) {
    d.innerHTML = `
      <div class="lock-top">
        <div class="lock-wordmark">Inkwell</div>
        <div class="lock-setup-header">
          <div class="lock-setup-title">Set a PIN</div>
          <div class="lock-setup-sub">Choose a 4-digit code to protect your journal</div>
        </div>
        <div class="lock-label" id="lock-label">Enter PIN</div>
        <div class="lock-dots" id="ldots">
          <div class="ldot" id="ld0"></div><div class="ldot" id="ld1"></div>
          <div class="ldot" id="ld2"></div><div class="ldot" id="ld3"></div>
        </div>
        <div class="lock-msg" id="lock-msg"></div>
      </div>
      <div class="lock-pad-wrap">
        <div class="lock-pad">${padHTML}</div>
      </div>`;
  } else {
    d.innerHTML = `
      <div class="lock-top">
        <div class="lock-wordmark">Inkwell</div>
        <div class="lock-time" id="lock-time">${getLockTime()}</div>
        <div class="lock-date">${getLockDate()}</div>
        <div class="lock-label">Enter PIN</div>
        <div class="lock-dots" id="ldots">
          <div class="ldot" id="ld0"></div><div class="ldot" id="ld1"></div>
          <div class="ldot" id="ld2"></div><div class="ldot" id="ld3"></div>
        </div>
        <div class="lock-msg" id="lock-msg"></div>
      </div>
      <div class="lock-pad-wrap">
        <div class="lock-pad">${padHTML}</div>
        <div class="lock-forgot" onclick="forgotPin()">Forgot PIN?</div>
      </div>`;
    // Live clock update
    d._clockInterval = setInterval(() => {
      const el = document.getElementById('lock-time');
      if (el) el.textContent = getLockTime();
      else clearInterval(d._clockInterval);
    }, 10000);
  }

  document.body.appendChild(d);
}

function lockTap(k) {
  const d = document.getElementById('lock');
  if (!d || lockInput.length >= 4) return;
  lockInput += k;
  // Haptic feedback on supporting devices
  if (navigator.vibrate) navigator.vibrate(8);
  for (let i = 0; i < 4; i++) {
    document.getElementById('ld' + i)?.classList.toggle('filled', i < lockInput.length);
  }
  if (lockInput.length === 4) {
    setTimeout(() => {
      if (d._isSetup) {
        if (!d._confirm) {
          d._confirm = lockInput;
          lockInput = '';
          for (let i = 0; i < 4; i++) document.getElementById('ld' + i)?.classList.remove('filled');
          const lbl = document.getElementById('lock-label');
          const msg = document.getElementById('lock-msg');
          if (lbl) lbl.textContent = 'Confirm PIN';
          if (msg) { msg.textContent = 'Enter it again to confirm'; msg.style.color = 'var(--f3)'; }
        } else if (d._confirm === lockInput) {
          clearInterval(d._clockInterval);
          A.pin = lockInput; DB.set('pin', A.pin);
          document.getElementById('lock')?.remove();
          toast('PIN set — your journal is now locked');
          d._onSuccess?.();
        } else {
          d._confirm = ''; lockInput = '';
          for (let i = 0; i < 4; i++) document.getElementById('ld' + i)?.classList.remove('filled');
          const lbl = document.getElementById('lock-label');
          const msg = document.getElementById('lock-msg');
          if (lbl) lbl.textContent = 'Enter PIN';
          if (msg) { msg.textContent = "PINs don't match — try again"; msg.style.color = 'var(--re)'; msg.className = 'lock-msg shake'; setTimeout(() => msg && (msg.className = 'lock-msg'), 400); }
          if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        }
      } else {
        if (lockInput === A.pin) {
          clearInterval(d._clockInterval);
          // Success animation — fade out
          d.style.animation = 'splashOut .35s ease forwards';
          setTimeout(() => {
            document.getElementById('lock')?.remove();
            d._onSuccess?.();
          }, 320);
        } else {
          lockInput = '';
          for (let i = 0; i < 4; i++) document.getElementById('ld' + i)?.classList.remove('filled');
          const msg = document.getElementById('lock-msg');
          if (msg) { msg.textContent = 'Incorrect PIN'; msg.className = 'lock-msg shake'; setTimeout(() => msg && (msg.className = 'lock-msg'), 400); }
          if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        }
      }
    }, 80);
  }
}

function lockDel() {
  if (!lockInput.length) return;
  lockInput = lockInput.slice(0, -1);
  if (navigator.vibrate) navigator.vibrate(4);
  for (let i = 0; i < 4; i++) {
    document.getElementById('ld' + i)?.classList.toggle('filled', i < lockInput.length);
  }
}

function forgotPin() {
  if (confirm('Reset PIN? Your journal data will be kept.')) {
    const d = document.getElementById('lock');
    if (d?._clockInterval) clearInterval(d._clockInterval);
    A.pin = ''; DB.set('pin', '');
    document.getElementById('lock')?.remove();
    toast('PIN removed');
    go('home');
  }
}

// ════════════════════════════════════════════════
//  NAV
// ════════════════════════════════════════════════
function go(tab) {
  A.tab = tab;
  document.querySelectorAll('.nt').forEach(n => {
    const on = n.dataset.tab === tab;
    n.classList.toggle('on', on);
    n.style.color = on ? 'var(--Au)' : 'var(--f3)';
  });
  document.getElementById('tb-title').textContent = PT[tab] || tab;
  document.getElementById('tb').classList.toggle('lined', tab !== 'home');
  document.getElementById('tb-right').innerHTML = tab === 'journal'
    ? `<button class="ib" onclick="document.querySelector('.sinp')?.focus()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--f2)" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>` : '';
  renderPage();
}

function renderPage() {
  const p = document.getElementById('page');
  p.className = 'fade';
  const fns = { home: rHome, journal: rJournal, notes: rNotes, gallery: rGallery, progress: rProgress, insights: rInsights, me: rMe };
  p.innerHTML = (fns[A.tab] || rHome)();

function calcStreak() {
  if (!A.entries.length) return 0;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dates = new Set(A.entries.map(e => {
    const d = new Date(e.ts || Date.now()); d.setHours(0, 0, 0, 0); return d.getTime();
  }));
  let streak = 0, cur = today.getTime();
  while (dates.has(cur)) { streak++; cur -= 86400000; }
  return streak;
}

function buildCalDays() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = now.getDate();
  const writtenDays = new Set(A.entries.filter(e => {
    const d = new Date(e.ts || 0);
    return d.getFullYear() === year && d.getMonth() === month;
  }).map(e => new Date(e.ts || 0).getDate()));
  return Array.from({ length: daysInMonth }, (_, i) => ({
    n: i + 1, w: writtenDays.has(i + 1), td: i + 1 === today
  }));
}

function getOnThisDay() {
  if (!A.entries.length) return null;
  const now = new Date();
  const m = now.getMonth(), d = now.getDate(), y = now.getFullYear();
  const match = A.entries.find(e => {
    const ed = new Date(e.ts || 0);
    return ed.getMonth() === m && ed.getDate() === d && ed.getFullYear() < y;
  });
  if (!match) return null;
  return { ...match, yearsAgo: y - new Date(match.ts || 0).getFullYear() };
}

function hdlPhoto(e) {
  const files = Array.from(e.target.files || []); if (!files.length) return;
  Promise.all(files.map(f => new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(f); })))

  e.target.value = '';
}

// Voice recording
async function togRec() { if (!REC.rec || REC.rec.state === 'inactive') await startRec(); else stopRec(); }
async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    REC.stream = stream; REC.chunks = []; REC.t0 = Date.now(); REC.dur = 0;
    const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? { mimeType: 'audio/webm;codecs=opus' } :
      MediaRecorder.isTypeSupported('audio/mp4') ? { mimeType: 'audio/mp4' } : {};
    REC.rec = new MediaRecorder(stream, opts);
    REC.rec.ondataavailable = e => { if (e.data.size > 0) REC.chunks.push(e.data); };
    REC.rec.onstop = procRec;
    REC.rec.start(100);
    document.getElementById('vbtn')?.classList.add('rec');
    document.getElementById('vdot')?.classList.add('rec');
    document.getElementById('vit').textContent = 'Recording…';
    document.getElementById('vis').textContent = 'Tap to stop';
    document.getElementById('vwrap').innerHTML = '<div class="vwrap"><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div></div>';
    const rt = document.getElementById('rtmr'); if (rt) rt.style.display = 'block';
    REC.timer = setInterval(() => { REC.dur = Math.floor((Date.now() - REC.t0) / 1000); const t = document.getElementById('rtmr'); if (t) t.textContent = fmtD(REC.dur); }, 1000);
  } catch { toast('Microphone access denied — enable it in browser settings'); }
}
function stopRec() {
  if (REC.rec && REC.rec.state !== 'inactive') REC.rec.stop();
  REC.stream?.getTracks().forEach(t => t.stop());
  clearInterval(REC.timer);
  document.getElementById('vbtn')?.classList.remove('rec');
  document.getElementById('vdot')?.classList.remove('rec');
  document.getElementById('vit').textContent = 'Tap to record';
  document.getElementById('vis').textContent = 'Records audio memo';
  document.getElementById('vwrap').innerHTML = '';
  const rt = document.getElementById('rtmr'); if (rt) rt.style.display = 'none';
}
function procRec() {
  if (!REC.chunks.length) return;
  const blob = new Blob(REC.chunks, { type: REC.rec?.mimeType || 'audio/webm' });
  const rd = new FileReader();
  rd.onload = ev => { WS.recs.push({ data: ev.target.result, dur: REC.dur }); const vr = document.getElementById('vrecs'); if (vr) vr.innerHTML = rRecs(); toast('Voice note saved'); REC.chunks = []; };
  rd.readAsDataURL(blob);
}
function rmRec(i) { WS.recs.splice(i, 1); const vr = document.getElementById('vrecs'); if (vr) vr.innerHTML = rRecs(); }

// Mood / journal / tags / formatting
function pickMood(l, c) {
  WS.mood = l; WS.mc = c;
  document.querySelectorAll('.mo').forEach(m => m.classList.toggle('on', m.textContent.trim().startsWith(l)));
  const chips = document.querySelector('.wchips');
  if (chips) { let mc = document.getElementById('mchip'); if (!mc) { mc = document.createElement('div'); mc.id = 'mchip'; mc.className = 'wch on'; chips.insertBefore(mc, chips.children[1]); } mc.innerHTML = `<div class="wch-d" style="background:${c}"></div>${l} <span onclick="clearMood()" style="margin-left:4px;opacity:.5">✕</span>`; }
}
function clearMood() { WS.mood = null; WS.mc = null; document.getElementById('mchip')?.remove(); document.querySelectorAll('.mo').forEach(m => m.classList.remove('on')); }
function cycleJ() { const i = JOURNALS.indexOf(WS.journal); WS.journal = JOURNALS[(i + 1) % JOURNALS.length]; document.getElementById('jdot').style.background = WS.journal.c; document.getElementById('jnm').textContent = WS.journal.name; }
function togTag(t) { const i = WS.tags.indexOf(t); if (i >= 0) WS.tags.splice(i, 1); else WS.tags.push(t); document.querySelectorAll('.wtag').forEach(el => { if (el.textContent.trim() === t) el.classList.toggle('on', WS.tags.includes(t)); }); }
function iFmt(pre, post) {
  const ta = document.getElementById('wb'); if (!ta) return;
  const s = ta.selectionStart, e2 = ta.selectionEnd, v = ta.value;
  ta.value = v.substring(0, s) + pre.replace(/\\n/g, '\n') + v.substring(s, e2) + post + v.substring(e2);
  const np = s + pre.replace(/\\n/g, '\n').length + (e2 - s);
  ta.selectionStart = ta.selectionEnd = np; WS.body = ta.value; ta.focus();
  const wc = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  const wn = document.getElementById('wcn'), wf = document.getElementById('wcf');
  if (wn) wn.textContent = wc + ' words'; if (wf) wf.style.width = Math.min((wc / A.goal) * 100, 100) + '%';
}
function applyT(i) {
  const ta = document.getElementById('wb'); if (!ta) return;
  const b = ta.value; ta.value = b + (b && !b.endsWith('\n') ? '\n\n' : '') + TEMPLATES[i].t;
  WS.body = ta.value;
  const wc = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  const wn = document.getElementById('wcn'), wf = document.getElementById('wcf');
  if (wn) wn.textContent = wc + ' words'; if (wf) wf.style.width = Math.min((wc / A.goal) * 100, 100) + '%';
  ta.focus(); toast('Template inserted');
}
function applyP(i) { const ta = document.getElementById('wb'); if (!ta) return; const b = ta.value; ta.value = b + (b && !b.endsWith('\n') ? '\n\n' : '') + PROMPTS[i] + ' '; WS.body = ta.value; ta.focus(); }
function showTmpls() { sheetModal('Templates', TEMPLATES.map((t, i) => `<div class="msh-it" onclick="applyT(${i});closeMod()"><div class="msh-in">${t.n}</div><div class="msh-id">${t.d}</div></div>`).join('')); }
function showPrompts() { sheetModal('Writing Prompts', PROMPTS.map((p, i) => `<div class="msh-it" onclick="applyP(${i});closeMod()"><div style="font-size:14px;color:var(--f2);line-height:1.45">${p}</div></div>`).join('')); }
function sheetModal(title, html) { closeMod(); const bg = document.createElement('div'); bg.id = 'mbg'; bg.onclick = e => { if (e.target === bg) bg.remove(); }; bg.innerHTML = `<div class="msheet"><div class="msh-h"><span class="msh-t">${title}</span><div class="msh-x" onclick="document.getElementById('mbg')?.remove()">✕</div></div><div class="msh-body">${html}</div></div>`; document.body.appendChild(bg); }
function closeMod() { document.getElementById('mbg')?.remove(); }

function saveEntry() {
  const title = document.getElementById('wt')?.value || WS.title;
  const body = document.getElementById('wb')?.value || WS.body;
  if (!title.trim() && !body.trim()) { toast('Write something first'); return; }
  const wc = body.trim() ? body.trim().split(/\s+/).length : 0;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
  const month = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
  const entry = {
    id: WS.id || Date.now(), ts: WS.id ? A.entries.find(e => e.id === WS.id)?.ts || now.getTime() : now.getTime(),
    date: WS.id ? A.entries.find(e => e.id === WS.id)?.date || dateStr : dateStr,
    month, title: title || 'Untitled', body: body || '',
    mood: WS.mood || '', mc: WS.mc || '#888', words: wc,
    tags: WS.tags, photos: WS.photos, recordings: WS.recs,
    journal: WS.journal.id, loc: WS.loc || '', wx: WS.wx || '',
  };
  if (WS.id) A.entries = A.entries.map(e => e.id === WS.id ? entry : e); else A.entries.unshift(entry);
  save();
  const btn = document.getElementById('sbtn'); if (btn) { btn.textContent = '✓ Saved'; btn.classList.add('ok'); }
  toast('Entry saved');
  setTimeout(closeWrite, 1100);
}
function closeWrite() { stopRec(); document.getElementById('wpanel')?.remove(); go(A.tab === 'write' ? 'home' : A.tab); }

  ${pinned.length ? `<div class="mdl">Pinned</div><div class="ngrid" style="border-top:1px solid var(--ln)">${pinned.map(n => nCard(n)).join('')}</div>` : ''}
  <div class="mdl">Notes</div>
  <div class="ngrid" style="border-top:1px solid var(--ln)">
    ${rest.length ? rest.map((n, i) => nCard(n, i === 0 && !pinned.length)).join('') : `<div style="grid-column:span 2;padding:36px;text-align:center;color:var(--f4);font-size:14px;background:var(--s1)">No notes yet — tap + to create one</div>`}
  </div>
  <button id="nfab" onclick="openNote(null)" style="display:flex">+</button>`;
}
function nCard(n, wide = false) {
  return `<div class="nc${wide ? ' wide' : ''}" onclick="openNote(${n.id})">

}
function openNote(id) {
  const ex = id ? A.notes.find(n => n.id === id) : null;

  p.innerHTML = `
    <div class="ph">
      <div class="ph-lft"><div class="back-btn" onclick="document.getElementById('npanel')?.remove()">Cancel</div></div>
      <div class="ph-rgt">
        ${ex ? `<button class="btn btn-d" onclick="delNote(${ex.id})">Delete</button>` : ''}
        <button class="btn btn-p" onclick="saveNote()">Save</button>
      </div>
    </div>
    <div style="border-bottom:1px solid var(--ln);display:flex;align-items:stretch;padding-left:20px">
      <div id="ne-bar" style="width:3px;background:${NS.acc};flex-shrink:0;align-self:stretch"></div>
      <input id="ne-t" type="text" style="flex:1;background:transparent;border:none;outline:none;font-family:'Libre Baskerville',serif;font-size:23px;color:var(--fg);padding:13px 18px 13px 14px;line-height:1.2;min-height:52px" placeholder="Note title…" value="${NS.title}">
    </div>
    <textarea id="ne-b" style="flex:1;width:100%;background:transparent;border:none;outline:none;padding:12px 20px;font-size:15px;color:var(--fg);line-height:1.75;font-weight:300;display:block;-webkit-overflow-scrolling:touch" placeholder="Start writing…">${NS.body}</textarea>
    <div class="ncdots">
      <span class="ncdl">Accent</span>
      ${NC_ACC.map(c => `<div class="ncd${NS.acc === c ? ' sel' : ''}" data-c="${c}" style="background:${c}" onclick="pickAcc('${c}')"></div>`).join('')}
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--f3)">
        Pin <div class="tgl${NS.pinned ? ' on' : ''}" id="pintgl" onclick="NS.pinned=!NS.pinned;this.classList.toggle('on',NS.pinned)"></div>
      </div>

  document.getElementById('screen').appendChild(p);
  document.getElementById('ne-t').addEventListener('input', e => NS.title = e.target.value);
  document.getElementById('ne-b').addEventListener('input', e => NS.body = e.target.value);
}
function pickAcc(c) { NS.acc = c; document.querySelectorAll('.ncd').forEach(d => d.classList.toggle('sel', d.dataset.c === c)); document.getElementById('ne-bar').style.background = c; }
function saveNote() {
  const t = document.getElementById('ne-t')?.value || NS.title, b = document.getElementById('ne-b')?.value || NS.body;
  if (!t.trim() && !b.trim()) { toast('Write something first'); return; }
  const ds = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
  if (NS.id) A.notes = A.notes.map(n => n.id === NS.id ? { ...n, title: t, body: b, acc: NS.acc, pinned: NS.pinned } : n);
  else A.notes.unshift({ id: Date.now(), title: t || 'Untitled', body: b, date: ds, pinned: NS.pinned, acc: NS.acc });
  save(); document.getElementById('npanel')?.remove(); renderPage(); toast('Note saved');
}
function delNote(id) { if (!confirm('Delete this note?')) return; A.notes = A.notes.filter(n => n.id !== id); save(); document.getElementById('npanel')?.remove(); renderPage(); toast('Note deleted'); }

}

function rProgress() {
  const streak = calcStreak();
  const tw = A.entries.reduce((a, e) => a + (e.words || 0), 0);
  const days = buildCalDays();
  // Weekly bar: last 7 days
  const bars = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i)); d.setHours(0, 0, 0, 0);
    const label = ['S', 'M', 'T', 'W', 'T', 'F', 'S'][d.getDay()];
    const written = A.entries.some(e => { const ed = new Date(e.ts || 0); ed.setHours(0, 0, 0, 0); return ed.getTime() === d.getTime(); });
    return { d: label, on: written, h: written ? 60 + Math.random() * 35 : 0 };
  });
  const ms = [
    { n: 'First Entry', d: 'Write your very first journal entry', done: A.entries.length >= 1 },
    { n: '7-Day Streak', d: 'Journal every day for a week', done: streak >= 7 },
    { n: '10 Entries', d: 'Write 10 journal entries', done: A.entries.length >= 10 },
    { n: '30-Day Streak', d: '30 consecutive days', done: streak >= 30 },
    { n: '50 Entries', d: 'Write 50 journal entries', done: A.entries.length >= 50 },
    { n: '10k Words', d: '10,000 words written', done: tw >= 10000 },
    { n: '100 Entries', d: 'Write 100 journal entries', done: A.entries.length >= 100 },
    { n: '90-Day Streak', d: '90 consecutive days', done: streak >= 90 },
  ];
  return `<div class="phero">
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--f3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px">Current Streak</div>
      <div class="pbig">${streak}</div>
      <div style="font-size:11.5px;color:var(--f3);margin-top:5px">${streak > 0 ? 'Keep it up!' : 'Start today'}</div>
    </div>
    <div class="pright">
      <div class="prl">Entries</div><div class="prv" style="color:var(--gr)">${A.entries.length}</div>
      <div class="prl" style="margin-top:14px">Words</div>

    </div>
  </div>
  <div class="sh" style="padding-top:16px"><span class="sl2">Last 7 Days</span></div>
  <div class="bchart">${bars.map(b => `<div class="bc"><div class="bf${b.on ? ' on' : ''}" style="height:${b.on ? b.h : 8}%"></div><div class="bd">${b.d}</div></div>`).join('')}</div>
  <div class="sh"><span class="sl2">This Month</span></div>
  <div class="cgrid">${days.map(d => `<div class="cg${d.w ? ' w' : ''}${d.td ? ' td' : ''}">${d.n}</div>`).join('')}</div>
  <div class="sh"><span class="sl2">Milestones</span></div>
  <div class="blk">${ms.map(m => `<div class="ms"><div class="ms-i" style="${m.done ? 'background:var(--Aub);color:var(--Au)' : ''}">${m.done ? '✦' : '○'}</div><div style="flex:1"><div class="ms-t" style="${!m.done ? 'color:var(--f2)' : ''}">${m.n}</div><div class="ms-d">${m.d}</div></div><div class="ms-s${m.done ? ' done' : ' lock'}">${m.done ? 'Earned' : 'Locked'}</div></div>`).join('')}</div>
  <div style="height:20px"></div>`;
}

// ════════════════════════════════════════════════
function rInsights() {
  const tot = A.entries.length, tw = A.entries.reduce((a, e) => a + (e.words || 0), 0), avgW = tot ? Math.round(tw / tot) : 0;
  const mc = {}; A.entries.forEach(e => { if (e.mood) mc[e.mood] = (mc[e.mood] || 0) + 1; });
  const topM = Object.entries(mc).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';
  const moodTotals = Object.values(mc).reduce((a, v) => a + v, 0);
  const md = Object.entries(mc).sort((a, b) => b[1] - a[1]).slice(0, 4).map(([l, v]) => ({
    l, p: Math.round((v / moodTotals) * 100), c: MOODS.find(m => m.l === l)?.c || '#888'
  }));
  const nPh = A.entries.reduce((a, e) => a + (e.photos?.length || 0), 0);
  const nRec = A.entries.reduce((a, e) => a + (e.recordings?.length || 0), 0);
  if (!tot) return `<div class="empty" style="padding-top:80px">Start journaling to see your insights.<br><a onclick="openWrite(null)">✦ Write your first entry →</a></div>`;
  const ws = [{ w: 'growth', s: 2 }, { w: 'clarity', s: 1 }, { w: 'rest', s: 0 }, { w: 'reflection', s: 2 }, { w: 'gratitude', s: 1 }, { w: 'family', s: 0 }, { w: 'progress', s: 1 }, { w: 'purpose', s: 2 }];
  return `<div class="i4">
    <div class="is"><div class="isv">${tot}</div><div class="isl">Total entries</div></div>
    <div class="is"><div class="isv">${avgW}</div><div class="isl">Avg words</div></div>
    <div class="is"><div class="isv">${nPh}</div><div class="isl">Photos</div></div>
    <div class="is"><div class="isv">${topM}</div><div class="isl">Top mood</div></div>
  </div>
  ${md.length ? `<div class="sh" style="padding-top:18px"><span class="sl2">Mood Breakdown</span></div>${md.map(m => `<div class="mbr"><div class="mbn">${m.l}</div><div class="mbb"><div class="mbf" style="width:${m.p}%;background:${m.c}"></div></div><div class="mbp">${m.p}%</div></div>`).join('')}` : ''}
  <div class="sh"><span class="sl2">Patterns</span></div>
  ${[
    { i: '↗', t: 'Keep Going', b: `You've written <span class="ic-hl">${tot} ${tot === 1 ? 'entry' : 'entries'}</span> and ${tw >= 1000 ? (Math.round(tw / 100) / 10) + 'k' : tw} words. Every entry counts.` },
    { i: '▣', t: 'Visual Memory', b: `<span class="ic-hl">${nPh} photo${nPh !== 1 ? 's' : ''}</span> attached. Photos make memories richer and more vivid.` },
    { i: '🎙', t: 'Voice Notes', b: `<span class="ic-hl">${nRec} recording${nRec !== 1 ? 's' : ''}</span> saved. Your most complete entries use multiple media types.` },
  ].map(c => `<div class="ic"><div class="ic-h"><div class="ic-i">${c.i}</div><div class="ic-t">${c.t}</div></div><div class="ic-b">${c.b}</div></div>`).join('')}
  <div class="sh"><span class="sl2">Themes</span></div>
  <div class="thwrap">${ws.map(({ w, s }) => `<div class="tw${s === 1 ? ' lg' : s === 2 ? ' xl' : ''}">${w}</div>`).join('')}</div>`;
}

function togS(k) { A.settings[k] = !A.settings[k]; DB.set('settings', A.settings); const el = document.getElementById('t-' + k); if (el) el.classList.toggle('on', A.settings[k]); }
function chTheme(t) { setTheme(t); renderPage(); }
function editName() { const n = prompt('Your name:', A.name); if (n?.trim()) { A.name = n.trim(); DB.set('name', A.name); renderPage(); toast('Name updated'); } }
function setGoal() { const g = parseInt(prompt('Daily goal (words):', A.goal)); if (g > 0) { A.goal = g; DB.set('goal', g); renderPage(); toast('Goal set to ' + g + ' words'); } }
function setupPin() { const prev = A.pin; A.pin = ''; showLock(() => { renderPage(); }); const chk = setInterval(() => { if (!document.getElementById('lock')) { clearInterval(chk); if (!A.pin) A.pin = prev; } }, 500); }
function removePin() { if (confirm('Remove PIN lock?')) { A.pin = ''; DB.set('pin', ''); renderPage(); toast('PIN removed'); } }

function exportData() {
  const blob = new Blob([JSON.stringify({ entries: A.entries, notes: A.notes, settings: A.settings, name: A.name, goal: A.goal, joined: A.joined, exportedAt: new Date().toISOString(), version: 1 }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'inkwell-backup-' + new Date().toISOString().split('T')[0] + '.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('Data exported — save this file somewhere safe');
}

function importData() {
  if (!confirm('Import will merge with existing data. Continue?')) return;
  const i = document.createElement('input'); i.type = 'file'; i.accept = '.json';
  i.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.entries) {
          // Merge — avoid duplicates by id
          const existingIds = new Set(A.entries.map(e => e.id));
          const newEntries = d.entries.filter(e => !existingIds.has(e.id));
          A.entries = [...newEntries, ...A.entries].sort((a, b) => (b.ts || 0) - (a.ts || 0));
        }
        if (d.notes) {
          const existingIds = new Set(A.notes.map(n => n.id));
          const newNotes = d.notes.filter(n => !existingIds.has(n.id));
          A.notes = [...newNotes, ...A.notes];
        }
        if (d.name && !A.name) { A.name = d.name; DB.set('name', A.name); }
        if (d.goal) { A.goal = d.goal; DB.set('goal', A.goal); }
        if (d.joined && !A.joined) { A.joined = d.joined; DB.set('joined', A.joined); }
        save(); renderPage();
        toast(`Imported: ${d.entries?.length || 0} entries, ${d.notes?.length || 0} notes`);
      } catch { toast('Invalid backup file'); }
    };
    r.readAsText(f);
  };
  i.click();
}

function clearData() {
  if (!confirm('Delete ALL data? This cannot be undone.')) return;
  if (!confirm('Are you absolutely sure? All entries, notes and settings will be lost.')) return;
  A.entries = []; A.notes = []; A.settings = { rem: true, streak: true, weekly: false, faceID: false, enc: true, priv: false };
  save(); renderPage(); toast('All data cleared');
}

// ════════════════════════════════════════════════
//  DRAWER
// ════════════════════════════════════════════════
function openDrw() {
  if (document.getElementById('drw')) return;
  const streak = calcStreak();
  const bg = document.createElement('div'); bg.id = 'dbg'; bg.onclick = closeDrw;
  const d = document.createElement('div'); d.id = 'drw';
  const nav = [
    { id: 'home', ico: '⌂', l: 'Home' }, { id: 'journal', ico: '≡', l: 'Journal' }, { id: 'write', ico: '✎', l: 'New Entry' },
    null,
    { id: 'notes', ico: '◻', l: 'Notes' }, { id: 'gallery', ico: '▣', l: 'Gallery' },
    null,
    { id: 'progress', ico: '◎', l: 'Progress' }, { id: 'insights', ico: '◉', l: 'Insights' },
    null,
    { id: 'me', ico: '◯', l: 'Profile & Settings' },
  ];
  d.innerHTML = `
    <div class="dtop">
      <div class="dav">${(A.name || '?').charAt(0).toUpperCase()}</div>
      <div class="dname">${A.name || 'Your Journal'}</div>
      <div class="dplan">Inkwell</div>
      <div class="dstats">
        <div><div class="dsv">${streak}</div><div class="dsl">Streak</div></div>
        <div><div class="dsv">${A.entries.length}</div><div class="dsl">Entries</div></div>
        <div><div class="dsv">${A.notes.length}</div><div class="dsl">Notes</div></div>
      </div>
    </div>
    <div class="dnav">
      ${nav.map(it => it === null ? `<div class="dsep"></div>` : `<div class="di${A.tab === it.id ? ' on' : ''}" onclick="drwGo('${it.id}')"><div class="di-ico">${it.ico}</div><div class="di-l">${it.l}</div></div>`).join('')}
    </div>
    <div class="dfoot">
      <div class="dver">Inkwell</div>
    </div>`;
  document.getElementById('screen').appendChild(bg);
  document.getElementById('screen').appendChild(d);
}
function closeDrw() { document.getElementById('dbg')?.remove(); document.getElementById('drw')?.remove(); }
function drwGo(tab) { closeDrw(); if (tab === 'write') openWrite(null); else go(tab); }

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
let _tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2600);
}

// ════════════════════════════════════════════════
//  INIT — splash → lock → onboard → home
// ════════════════════════════════════════════════
setTheme(A.theme);

// Show splash, then proceed
const splashEl = document.getElementById('splash');
const SPLASH_MIN = 1600; // ms minimum splash time
const splashStart = Date.now();

function afterSplash() {
  if (splashEl) {
    splashEl.classList.add('hide');
    setTimeout(() => splashEl?.remove(), 600);
  }
  if (A.pin) {
    showLock(() => {
      if (!A.name) showOnboard();
      else go('home');
    });
  } else if (!A.name) {
    showOnboard();
  } else {
    go('home');
  }
}

// Wait for fonts + minimum splash time
document.fonts.ready.then(() => {
  const elapsed = Date.now() - splashStart;
  const remaining = Math.max(0, SPLASH_MIN - elapsed);
  setTimeout(afterSplash, remaining);
}).catch(() => {
  setTimeout(afterSplash, SPLASH_MIN);
});

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(() => console.log('✦ Inkwell ready'))
      .catch(e => console.warn('SW:', e));
  });
}

// Android back button
window.addEventListener('popstate', () => {
  for (const id of ['mbg', 'wpanel', 'npanel', 'edet', 'dbg', 'pv', 'onboard']) {
    const el = document.getElementById(id);
    if (el) { el.remove(); if (id === 'wpanel') stopRec(); return; }
  }
});

// Prevent body scroll bounce
document.addEventListener('touchmove', e => {
  if (e.target === document.body || e.target === document.documentElement) e.preventDefault();
}, { passive: false });
</script>
