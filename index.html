<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Inkwell"/>
<meta name="theme-color" content="#0a0a0c" id="tcm"/>
<title>Inkwell Journal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

:root{
  --bg:#0a0a0c;--s1:#111115;--s2:#18181e;--s3:#202028;--s4:#2a2a35;
  --ln:#24242e;--ln2:#303040;
  --Au:#c8914e;--AuL:#e0aa68;--AuD:#7a5830;--Aub:rgba(200,145,78,.12);
  --fg:#ede8e0;--f2:#9896a2;--f3:#585664;--f4:#383644;
  --gr:#5a9e74;--bl:#5a7e9e;--re:#9e5a5a;--pu:#7a5c9e;
  --nav:rgba(10,10,14,.95);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
[data-t=light]{--bg:#f4f2ee;--s1:#ffffff;--s2:#ede9e3;--s3:#e4dfd8;--s4:#d8d2c8;--ln:#e0dbd2;--ln2:#ccc6bc;--Au:#9e6e38;--AuL:#b88040;--AuD:#7a5428;--Aub:rgba(158,110,56,.1);--fg:#1c1a16;--f2:#5c5850;--f3:#8a8680;--f4:#aca8a2;--gr:#3a7e58;--bl:#3a5e7e;--re:#7e3a3a;--nav:rgba(244,242,238,.95);}
[data-t=sepia]{--bg:#1c1710;--s1:#241e14;--s2:#2c261a;--s3:#342e22;--s4:#3e362a;--ln:#3a3228;--ln2:#4a4238;--Au:#c8a060;--AuL:#e0b878;--AuD:#8a6c2e;--Aub:rgba(200,160,96,.1);--fg:#f0e8d8;--f2:#b0a898;--f3:#706858;--f4:#504840;--gr:#6a9e78;--bl:#6a8e9e;--re:#9e6a5a;--nav:rgba(28,23,16,.95);}
[data-t=midnight]{--bg:#060812;--s1:#0c0e1c;--s2:#121628;--s3:#181e34;--s4:#20263e;--ln:#1e2434;--ln2:#28304a;--Au:#8a9ee0;--AuL:#a0b0f0;--AuD:#5a6aaa;--Aub:rgba(138,158,224,.1);--fg:#dce0f4;--f2:#8890aa;--f3:#505872;--f4:#343854;--gr:#5a9e8a;--bl:#5a7eaa;--re:#9e5a6c;--nav:rgba(6,8,18,.95);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;}
body{height:100%;background:var(--bg);color:var(--fg);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:pan-y;transition:background .3s,color .3s;}
input,textarea,button,select{font-family:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}
textarea{resize:none;}
img{max-width:100%;height:auto;object-fit:cover;}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
#tb{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:calc(var(--sat) + 14px) 18px 12px;
  background:var(--bg);
  border-bottom:1px solid transparent;
  flex-shrink:0;z-index:60;
  transition:border-color .2s, background .3s;
  min-height:calc(var(--sat) + 56px);
}
#tb.lined{border-bottom-color:var(--ln);}
#tb-left{display:flex;align-items:center;gap:10px;}
#tb-title{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;color:var(--fg);letter-spacing:.01em;transition:color .3s;}
#tb-right{display:flex;align-items:center;gap:4px;}
.ib{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .12s;color:var(--f2);}
.ib:active{background:var(--s3);}
.ham{display:flex;flex-direction:column;gap:5px;width:38px;height:38px;align-items:flex-start;justify-content:center;padding:0 10px;border-radius:10px;transition:background .12s;}
.ham:active{background:var(--s3);}
.hl{height:1px;background:var(--f2);border-radius:99px;transition:width .2s;}

/* ── SCREEN ── */
#screen{flex:1;position:relative;overflow:hidden;}
#page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sab) + 76px);scroll-behavior:smooth;}
#page::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
#bnav{
  height:calc(var(--sab) + 64px);
  padding:0 6px calc(var(--sab) + 6px);
  background:var(--nav);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--ln);
  display:flex;align-items:flex-start;padding-top:8px;
  flex-shrink:0;z-index:60;
  transition:background .3s,border-color .3s;
}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;user-select:none;transition:opacity .1s;}
.nt:active{opacity:.6;}
.nt-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.nt-ic svg{transition:opacity .2s;}
.nt-lbl{font-size:9.5px;font-weight:500;letter-spacing:.03em;color:var(--f3);transition:color .2s;}
.nt.on .nt-lbl{color:var(--Au);}
.nt-pip{width:3px;height:3px;border-radius:50%;background:var(--Au);opacity:0;transition:opacity .2s;}
.nt.on .nt-pip{opacity:1;}

/* ── ANIM ── */
.fade{animation:fadeUp .22s cubic-bezier(.4,0,.2,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .28s cubic-bezier(.32,1,.64,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slide-right{animation:slideRight .26s cubic-bezier(.32,1,.64,1);}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.slide-left{animation:slideLeft .26s cubic-bezier(.32,1,.64,1);}
@keyframes slideLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* ── DRAWER ── */
#drw-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;backdrop-filter:blur(6px);animation:fadeUp .18s ease;}
#drw{
  position:fixed;top:0;left:0;bottom:0;width:min(290px,80vw);
  background:var(--s1);border-right:1px solid var(--ln);
  z-index:201;display:flex;flex-direction:column;
  animation:slideLeft .26s cubic-bezier(.32,1,.64,1);
  transition:background .3s;
}
.drw-top{padding:calc(var(--sat)+44px) 24px 20px;border-bottom:1px solid var(--ln);}
.drw-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--AuD),var(--Au));display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:#1a1000;margin-bottom:14px;}
.drw-name{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:400;color:var(--fg);}
.drw-sub{font-size:11px;color:var(--Au);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.drw-stats{display:flex;gap:20px;margin-top:14px;}
.dsv{font-family:'DM Mono',monospace;font-size:20px;color:var(--fg);line-height:1;}
.dsl{font-size:10px;color:var(--f3);margin-top:2px;letter-spacing:.06em;}
.drw-nav{flex:1;overflow-y:auto;padding:12px 0;}
.drw-nav::-webkit-scrollbar{display:none;}
.drw-sec{font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--f4);padding:12px 24px 4px;}
.drw-it{display:flex;align-items:center;gap:14px;padding:12px 24px;cursor:pointer;transition:background .12s;}
.drw-it:active{background:var(--s2);}
.drw-it.on{background:var(--Aub);}
.drw-it-ico{width:20px;text-align:center;font-size:15px;color:var(--f3);flex-shrink:0;}
.drw-it.on .drw-it-ico{color:var(--Au);}
.drw-it-lbl{font-size:14px;font-weight:400;color:var(--f2);}
.drw-it.on .drw-it-lbl{color:var(--Au);}
.drw-sep{height:1px;background:var(--ln);margin:8px 0;}
.drw-foot{padding:16px 24px calc(var(--sab)+20px);border-top:1px solid var(--ln);}
.drw-signout{font-size:13.5px;color:var(--re);cursor:pointer;padding:8px 0;}
.drw-ver{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);margin-top:8px;}

/* ── OVERLAY PANELS ── */
.panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transition:background .3s;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat)+14px) 20px 12px;border-bottom:1px solid var(--ln);flex-shrink:0;}
.ph-left{display:flex;align-items:center;gap:10px;}
.ph-back{display:flex;align-items:center;gap:6px;color:var(--Au);font-size:13.5px;cursor:pointer;font-weight:500;}
.ph-title{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;color:var(--fg);}
.ph-right{display:flex;align-items:center;gap:8px;}
.act-btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;letter-spacing:.02em;cursor:pointer;transition:all .15s;}
.act-btn.primary{background:var(--Au);color:#1a1000;}
.act-btn.primary:active{opacity:.85;}
.act-btn.primary.done{background:var(--gr);}
.act-btn.ghost{background:transparent;color:var(--f2);border:1px solid var(--ln);}
.act-btn.danger{background:transparent;color:var(--re);border:1px solid rgba(158,90,90,.3);}
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.panel-scroll::-webkit-scrollbar{display:none;}

/* ── UTILITY ── */
.block{background:var(--s1);border-top:1px solid var(--ln);border-bottom:1px solid var(--ln);margin-bottom:2px;transition:background .3s;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 6px;}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);}
.sec-link{font-size:12px;color:var(--Au);font-weight:500;cursor:pointer;}
.mdlbl{padding:14px 20px 5px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);letter-spacing:.12em;text-transform:uppercase;}
.divider{height:1px;background:var(--ln);margin:0;}

/* ── HOME ── */
.h-hero{padding:22px 20px 0;}
.h-date{font-size:11px;color:var(--f3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.h-name{font-family:'Libre Baskerville',serif;font-size:34px;font-weight:400;color:var(--fg);line-height:1.1;letter-spacing:-.01em;}
.h-name em{font-style:italic;color:var(--Au);}
.streak-row{display:flex;gap:8px;padding:14px 20px 0;}
.scard{flex:1;background:var(--s1);border:1px solid var(--ln);border-radius:14px;padding:12px 10px;text-align:center;position:relative;overflow:hidden;transition:background .3s;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:0;}
.scard.a::before{background:linear-gradient(90deg,var(--Au),transparent);}
.scard.b::before{background:linear-gradient(90deg,var(--gr),transparent);}
.scard.c::before{background:linear-gradient(90deg,var(--bl),transparent);}
.scard.d::before{background:linear-gradient(90deg,var(--pu),transparent);}
.sv{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;color:var(--fg);}
.sv.a{color:var(--Au);}
.sv.b{color:var(--gr);}
.sv.c{color:var(--bl);}
.sv.d{color:var(--pu);}
.sl{font-size:9px;color:var(--f3);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
.otd{margin:16px 20px 0;background:var(--s1);border:1px solid var(--ln);border-left:3px solid var(--Au);border-radius:0 14px 14px 0;padding:14px 16px;cursor:pointer;transition:background .12s;}
.otd:active{background:var(--s2);}
.otd-ey{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--Au);margin-bottom:5px;}
.otd-ti{font-family:'Libre Baskerville',serif;font-size:17px;color:var(--fg);line-height:1.3;margin-bottom:4px;}
.otd-pr{font-size:12.5px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.otd-me{font-family:'DM Mono',monospace;font-size:10px;color:var(--f3);margin-top:8px;}
.q-card{margin:16px 20px 0;padding:14px 0;border-top:1px solid var(--ln);border-bottom:1px solid var(--ln);}
.q-body{font-family:'Libre Baskerville',serif;font-size:15.5px;font-style:italic;color:var(--f2);line-height:1.65;}
.q-attr{font-size:10px;color:var(--f3);margin-top:8px;letter-spacing:.08em;}
.act-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;}
.ag{aspect-ratio:1;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8.5px;color:var(--f4);transition:background .3s;}
.ag.w{background:var(--Aub);color:var(--Au);}
.ag.today{background:var(--Au);color:#1a1000;font-weight:700;}

/* ── ENTRY ITEM ── */
.ei{padding:15px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.ei:last-child{border-bottom:none;}
.ei:active{background:var(--s2);}
.ei-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ei-lft{display:flex;align-items:center;gap:7px;}
.ei-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ei-date{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);letter-spacing:.04em;}
.ei-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);}
.ei-title{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;color:var(--fg);line-height:1.2;margin-bottom:4px;}
.ei-prev{font-size:13px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ei-foot{display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap;}
.mood-badge{font-size:11px;padding-left:7px;border-left:2px solid;font-weight:400;}
.chip{padding:2px 9px;border-radius:5px;background:var(--s3);font-size:10px;color:var(--f3);}
.has-photo{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--f4);}

/* ── ENTRY DETAIL ── */
#entry-detail .panel-scroll{padding-bottom:30px;}
.ed-title{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:400;color:var(--fg);line-height:1.15;padding:20px 20px 12px;}
.ed-chips{display:flex;gap:7px;padding:0 20px 16px;flex-wrap:wrap;}
.echip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;background:var(--s2);border:1px solid var(--ln);font-size:11px;color:var(--f3);}
.echip-d{width:5px;height:5px;border-radius:50%;}
.ed-body{font-size:15.5px;color:var(--f2);line-height:1.85;font-weight:300;padding:0 20px;}
.ed-body p{margin-bottom:16px;}
.ed-sec-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);padding:16px 20px 8px;}
.ed-photos{display:flex;gap:8px;overflow-x:auto;padding:0 20px 20px;}
.ed-photos::-webkit-scrollbar{display:none;}
.ed-photo{width:100px;height:100px;border-radius:12px;flex-shrink:0;overflow:hidden;border:1px solid var(--ln);cursor:pointer;}
.ed-photo img{width:100%;height:100%;object-fit:cover;}
.ed-audio-wrap{padding:0 20px 20px;display:flex;flex-direction:column;gap:8px;}
.audio-card{background:var(--s2);border:1px solid var(--ln);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.audio-play{width:36px;height:36px;border-radius:50%;background:var(--Au);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;color:#1a1000;}
.audio-info{flex:1;min-width:0;}
.audio-label{font-size:13px;font-weight:500;color:var(--fg);}
.audio-dur{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);margin-top:2px;}

/* ── SEARCH ── */
.srch-bar{padding:10px 20px;border-bottom:1px solid var(--ln);}
.srch-inner{position:relative;}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--f3);pointer-events:none;}
.srch-inp{width:100%;background:var(--s2);border:1px solid var(--ln);border-radius:11px;padding:10px 14px 10px 38px;color:var(--fg);font-size:14px;outline:none;transition:border-color .15s,background .3s;}
.srch-inp::placeholder{color:var(--f4);}
.srch-inp:focus{border-color:var(--Au);}
.filt-row{display:flex;gap:7px;padding:10px 20px;border-bottom:1px solid var(--ln);overflow-x:auto;}
.filt-row::-webkit-scrollbar{display:none;}
.fp{padding:6px 14px;border-radius:8px;border:1px solid var(--ln2);font-size:12px;color:var(--f3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-weight:400;}
.fp.on{background:var(--Aub);border-color:var(--AuD);color:var(--Au);}
.empty{text-align:center;padding:50px 24px;color:var(--f4);font-size:14px;line-height:1.8;}
.empty span{color:var(--Au);cursor:pointer;}

/* ── WRITE ── */
.wr-chips{display:flex;gap:7px;padding:10px 20px;border-bottom:1px solid var(--ln);overflow-x:auto;flex-shrink:0;}
.wr-chips::-webkit-scrollbar{display:none;}
.wchip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;background:var(--s2);border:1px solid var(--ln);font-size:11.5px;color:var(--f3);cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:400;transition:all .14s;}
.wchip.on{border-color:var(--AuD);color:var(--Au);background:var(--Aub);}
.wchip-d{width:5px;height:5px;border-radius:50%;}
.j-sel{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--s2);border:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.j-sel:active{background:var(--s3);}
.j-dot{width:7px;height:7px;border-radius:50%;}
.j-name{font-size:12px;color:var(--f2);font-weight:400;}
.toolbar{display:flex;align-items:center;gap:3px;padding:7px 16px;border-bottom:1px solid var(--ln);overflow-x:auto;flex-shrink:0;background:var(--s1);}
.toolbar::-webkit-scrollbar{display:none;}
.tb-btn{min-width:34px;height:32px;border-radius:8px;background:transparent;color:var(--f3);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0 6px;white-space:nowrap;}
.tb-btn:active{background:var(--s3);color:var(--fg);}
.tb-sep{width:1px;height:20px;background:var(--ln);margin:0 4px;flex-shrink:0;}
.wr-title-inp{width:100%;background:transparent;border:none;outline:none;padding:16px 20px 8px;font-family:'Libre Baskerville',serif;font-size:27px;font-weight:400;color:var(--fg);line-height:1.2;letter-spacing:-.01em;}
.wr-title-inp::placeholder{color:var(--s4);}
.wr-body-inp{width:100%;background:transparent;border:none;outline:none;padding:10px 20px;font-size:15.5px;color:var(--fg);line-height:1.82;font-weight:300;min-height:200px;}
.wr-body-inp::placeholder{color:var(--f4);}
.wc-bar-wrap{display:flex;align-items:center;gap:10px;padding:8px 20px;border-top:1px solid var(--ln);}
.wc-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);white-space:nowrap;}
.wc-track{flex:1;height:2px;background:var(--s3);border-radius:99px;overflow:hidden;}
.wc-fill{height:100%;background:var(--Au);border-radius:99px;transition:width .3s;}
.wc-goal{font-size:11px;color:var(--f3);white-space:nowrap;}

/* Mood picker */
.mood-section{padding:10px 20px;border-top:1px solid var(--ln);}
.section-mini-lbl{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f4);margin-bottom:8px;}
.mood-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
.mood-row::-webkit-scrollbar{display:none;}
.mo{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;border:1px solid var(--ln);background:var(--s2);font-size:12.5px;color:var(--f2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .14s;}
.mo.on{border-color:var(--AuD);background:var(--Aub);color:var(--Au);}
.mo-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Photo section */
.photo-sec{padding:10px 20px;border-top:1px solid var(--ln);}
.psec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.psec-lbl{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);}
.p-add{padding:5px 13px;border-radius:7px;border:1px solid var(--AuD);background:var(--Aub);font-size:11.5px;color:var(--Au);cursor:pointer;font-weight:500;}
.photo-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.photo-strip::-webkit-scrollbar{display:none;}
.pt{width:80px;height:80px;border-radius:11px;flex-shrink:0;overflow:hidden;position:relative;border:1px solid var(--ln);cursor:pointer;}
.pt img{width:100%;height:100%;object-fit:cover;}
.pt-rm{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;z-index:2;}
.pt-add{width:80px;height:80px;border-radius:11px;flex-shrink:0;border:1px dashed var(--ln2);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:background .12s;}
.pt-add:active{background:var(--s3);}
.pt-add-ico{font-size:20px;color:var(--f3);}
.pt-add-lbl{font-size:9px;color:var(--f4);letter-spacing:.06em;text-transform:uppercase;font-weight:500;}
/* Hidden file input */
#photo-input{display:none;}

/* Voice section */
.voice-sec{padding:12px 20px;border-top:1px solid var(--ln);}
.voice-row{display:flex;align-items:center;gap:14px;}
.voice-btn{width:44px;height:44px;border-radius:50%;background:var(--s2);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .18s;}
.voice-btn.rec{background:rgba(158,90,90,.15);border-color:var(--re);}
.voice-btn.playing{background:var(--Aub);border-color:var(--AuD);}
.v-dot{width:14px;height:14px;border-radius:50%;background:var(--f3);transition:all .2s;}
.v-dot.rec{background:var(--re);animation:vpulse 1.1s ease-in-out infinite;}
.v-play{width:0;height:0;border-style:solid;border-width:6px 0 6px 11px;border-color:transparent transparent transparent var(--Au);}
@keyframes vpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.voice-info{flex:1;}
.vi-title{font-size:13.5px;font-weight:500;color:var(--fg);}
.vi-sub{font-size:11px;color:var(--f3);margin-top:2px;}
.vwaves{display:flex;align-items:center;gap:2.5px;height:20px;}
.vw{width:2.5px;border-radius:99px;background:var(--Au);animation:vwa .9s ease-in-out infinite;}
.vw:nth-child(2){animation-delay:.12s}.vw:nth-child(3){animation-delay:.24s}.vw:nth-child(4){animation-delay:.36s}.vw:nth-child(5){animation-delay:.48s}.vw:nth-child(6){animation-delay:.6s}
@keyframes vwa{0%,100%{height:3px}50%{height:18px}}
.rec-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--re);font-weight:500;}
.voice-recordings{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.vrec{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--ln);border-radius:10px;padding:10px 12px;}
.vrec-play{width:32px;height:32px;border-radius:50%;background:var(--Au);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.vrec-play-ic{width:0;height:0;border-style:solid;border-width:5px 0 5px 9px;border-color:transparent transparent transparent #1a1000;}
.vrec-info{flex:1;}
.vrec-label{font-size:12.5px;font-weight:500;color:var(--fg);}
.vrec-dur{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);margin-top:1px;}
.vrec-del{font-size:13px;color:var(--f4);cursor:pointer;padding:4px;}

/* Tags */
.tags-sec{padding:10px 20px;border-top:1px solid var(--ln);}
.tags-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.wtag{padding:5px 13px;border-radius:8px;border:1px solid var(--ln);background:var(--s2);font-size:12px;color:var(--f3);cursor:pointer;transition:all .14s;font-weight:400;}
.wtag.on{border-color:var(--AuD);color:var(--Au);background:var(--Aub);}

/* Templates */
.tmpl-sec{padding:10px 20px;border-top:1px solid var(--ln);}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
.tmpl{padding:13px 14px;background:var(--s2);border:1px solid var(--ln);border-radius:10px;cursor:pointer;transition:all .14s;}
.tmpl:active{background:var(--s3);}
.tmpl-name{font-size:13px;color:var(--fg);font-weight:500;margin-bottom:3px;}
.tmpl-desc{font-size:11px;color:var(--f3);line-height:1.4;}

/* Prompts */
.prompts-sec{padding:10px 20px 20px;border-top:1px solid var(--ln);}
.pmt{padding:11px 0;border-bottom:1px solid var(--ln);font-size:13.5px;color:var(--f2);cursor:pointer;line-height:1.45;transition:color .14s;}
.pmt:last-child{border-bottom:none;padding-bottom:0;}
.pmt:active{color:var(--Au);}

/* ── NOTES ── */
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--ln);}
.nc{background:var(--s1);padding:16px 15px;cursor:pointer;min-height:140px;display:flex;flex-direction:column;transition:background .12s;}
.nc:active{background:var(--s2);}
.nc.wide{grid-column:span 2;}
.nc-bar{height:2px;margin-bottom:11px;flex-shrink:0;border-radius:0;}
.nc-title{font-family:'Libre Baskerville',serif;font-size:16.5px;font-weight:400;color:var(--fg);line-height:1.25;margin-bottom:6px;}
.nc-body{font-size:12.5px;color:var(--f2);line-height:1.55;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.nc-date{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);margin-top:10px;}
#note-fab{position:fixed;bottom:calc(var(--sab)+82px);right:20px;width:50px;height:50px;border-radius:50%;background:var(--Au);color:#1a1000;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:50;transition:transform .15s,opacity .15s;font-weight:300;}
#note-fab:active{transform:scale(.9);}
.ne-acc-bar{width:3px;border-radius:99px;margin-right:14px;flex-shrink:0;align-self:stretch;}
.ne-title-inp{flex:1;background:transparent;border:none;outline:none;font-family:'Libre Baskerville',serif;font-size:24px;font-weight:400;color:var(--fg);line-height:1.2;padding:14px 20px 14px 0;}
.ne-title-inp::placeholder{color:var(--s4);}
.ne-body-inp{width:100%;flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--fg);line-height:1.75;font-weight:300;padding:12px 20px;display:block;}
.ne-body-inp::placeholder{color:var(--f4);}
.nc-dot-row{display:flex;align-items:center;gap:9px;padding:12px 20px;border-top:1px solid var(--ln);}
.nc-dot-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--f4);margin-right:4px;}
.ncdot{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:all .15s;flex-shrink:0;}
.ncdot.sel{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--Au);}

/* ── GALLERY ── */
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--ln);}
.gc{background:var(--s1);aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;}
.gc:active{opacity:.8;}
.gc.feat{grid-column:span 2;aspect-ratio:auto;height:185px;}
.gc img{width:100%;height:100%;object-fit:cover;}
.gc-em{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;}
.gover{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.75));display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
.g-date{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.75);}
.g-lbl{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}

/* ── PROGRESS ── */
.prog-hero{margin:16px 20px 0;background:var(--s1);border:1px solid var(--ln);border-radius:18px;padding:22px;display:flex;align-items:flex-end;justify-content:space-between;transition:background .3s;}
.prog-big{font-family:'Libre Baskerville',serif;font-size:80px;font-weight:400;color:var(--Au);line-height:1;letter-spacing:-.02em;}
.prog-r{text-align:right;padding-bottom:6px;}
.pr-lbl{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.pr-val{font-family:'DM Mono',monospace;font-size:26px;line-height:1;}
.bchart{display:flex;align-items:flex-end;gap:7px;height:80px;padding:0 20px;}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bf{width:100%;border-radius:4px 4px 0 0;background:var(--s3);min-height:3px;transition:height .6s cubic-bezier(.34,1.2,.64,1);}
.bf.on{background:linear-gradient(180deg,var(--AuL),var(--AuD));}
.bd{font-family:'DM Mono',monospace;font-size:9px;color:var(--f4);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;}
.cg{aspect-ratio:1;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--f4);transition:background .3s;}
.cg.w{background:var(--Aub);color:var(--Au);}
.cg.today{background:var(--Au);color:#1a1000;font-weight:700;}
.ms{display:flex;align-items:center;gap:13px;padding:14px 20px;border-bottom:1px solid var(--ln);}
.ms:last-child{border-bottom:none;}
.ms-ico{width:36px;height:36px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .3s;}
.ms-title{font-size:14px;font-weight:400;color:var(--fg);}
.ms-desc{font-size:11.5px;color:var(--f3);margin-top:1px;}
.ms-stat{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0;}
.ms-stat.done{color:var(--Au);}
.ms-stat.lock{color:var(--f4);}

/* ── INSIGHTS ── */
.ins-4{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--ln);border-left:1px solid var(--ln);}
.is{padding:16px 16px;border-right:1px solid var(--ln);border-bottom:1px solid var(--ln);}
.is-v{font-family:'DM Mono',monospace;font-size:26px;color:var(--Au);letter-spacing:-.02em;line-height:1;}
.is-l{font-size:11px;color:var(--f3);margin-top:4px;}
.mb-row{display:flex;align-items:center;gap:10px;padding:8px 20px;}
.mb-n{font-size:12px;color:var(--f2);width:64px;flex-shrink:0;}
.mb-bg{flex:1;height:4px;background:var(--s3);border-radius:99px;overflow:hidden;}
.mb-f{height:100%;border-radius:99px;}
.mb-p{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);width:30px;text-align:right;}
.icard{margin:0 20px 9px;padding:15px;background:var(--s1);border:1px solid var(--ln);border-radius:13px;transition:background .3s;}
.ic-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ic-ico{width:30px;height:30px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;color:var(--Au);transition:background .3s;}
.ic-t{font-size:14px;font-weight:500;color:var(--fg);}
.ic-b{font-size:13px;color:var(--f2);line-height:1.6;}
.ic-hl{color:var(--Au);}
.theme-wrap{display:flex;flex-wrap:wrap;gap:7px;padding:4px 20px 24px;}
.tw{padding:5px 13px;border-radius:7px;border:1px solid var(--ln2);background:var(--s2);font-size:12px;color:var(--f3);}
.tw.lg{font-size:14px;color:var(--fg);}
.tw.xl{font-size:16px;color:var(--Au);border-color:var(--AuD);background:var(--Aub);}

/* ── SETTINGS ── */
.prof-block{padding:22px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--ln);}
.prof-av{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--AuD),var(--Au));display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;color:#1a1000;flex-shrink:0;}
.prof-name{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:400;color:var(--fg);}
.prof-plan{font-size:11px;color:var(--Au);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
.prof-since{font-size:11px;color:var(--f4);margin-top:2px;}
.prof-edit{margin-left:auto;padding:7px 15px;border-radius:9px;border:1px solid var(--ln2);background:transparent;font-size:12.5px;color:var(--f3);cursor:pointer;flex-shrink:0;transition:background .12s;}
.prof-edit:active{background:var(--s3);}
.sgrp{margin:16px 0 0;}
.sgrp-lbl{padding:4px 20px 8px;font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--f4);}
.srow{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.srow:last-child{border-bottom:none;}
.srow:active{background:var(--s2);}
.srow-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.srow-lbl{font-size:14px;font-weight:400;color:var(--fg);}
.srow-sub{font-size:11.5px;color:var(--f3);margin-top:1px;}
.sright{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}
.sval{font-size:12.5px;color:var(--f3);}
.sarr{font-size:17px;color:var(--f4);}
.badge{padding:2px 9px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.05em;}
.badge.pro{background:var(--Aub);color:var(--Au);border:1px solid var(--AuD);}
.badge.new{background:rgba(90,158,116,.1);color:var(--gr);border:1px solid rgba(90,158,116,.3);}
.tgl{width:44px;height:26px;border-radius:99px;background:var(--s4);border:1px solid var(--ln);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tgl.on{background:var(--Au);border-color:var(--Au);}
.tgl::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--f3);top:2px;left:2px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.tgl.on::after{left:20px;background:#1a1000;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:12px 20px;}
.topt{padding:13px 14px;border:1px solid var(--ln);border-radius:12px;cursor:pointer;transition:all .15s;}
.topt.sel{border-color:var(--Au);background:var(--Aub);}
.topt:active{opacity:.8;}
.topt-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.topt-name{font-size:13.5px;font-weight:500;color:var(--fg);}
.tchk{width:19px;height:19px;border-radius:50%;border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--Au);}
.tchk.sel{background:var(--Au);color:#1a1000;border-color:var(--Au);}
.tswatches{display:flex;gap:5px;}
.tswatch{width:17px;height:17px;border-radius:5px;}
.jrow{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.jrow:active{background:var(--s2);}
.jdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.jname{font-size:14px;color:var(--fg);}
.jcnt{font-size:11.5px;color:var(--f3);margin-left:auto;}
.signout{display:block;padding:14px 20px;font-size:14px;color:var(--re);cursor:pointer;}
.ver{padding:2px 20px 36px;font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);letter-spacing:.07em;}

/* ── TOAST ── */
#toast{position:fixed;left:50%;bottom:calc(var(--sab)+84px);transform:translateX(-50%) translateY(10px);background:var(--s1);border:1px solid var(--ln);border-radius:12px;padding:11px 20px;font-size:13.5px;color:var(--fg);z-index:999;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.35);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── PHOTO VIEWER ── */
#photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeUp .18s ease;}
#photo-viewer img{max-width:100%;max-height:100%;object-fit:contain;}
#photo-viewer-close{position:absolute;top:calc(var(--sat)+16px);right:20px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
</style>
</head>
<body>
<input type="file" id="photo-input" accept="image/*" multiple>

<div id="app">
  <div id="tb">
    <div id="tb-left">
      <button class="ham" id="ham-btn" onclick="openDrawer()">
        <div class="hl" style="width:20px"></div>
        <div class="hl" style="width:15px"></div>
        <div class="hl" style="width:10px"></div>
      </button>
      <span id="tb-title">Inkwell</span>
    </div>
    <div id="tb-right"></div>
  </div>
  <div id="screen">
    <div id="page" class="fade"></div>
  </div>
  <nav id="bnav">
    <div class="nt on" data-tab="home" onclick="goTab('home')">
      <div class="nt-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor"/><path d="M9 21V12h6v9" stroke="currentColor"/></svg></div>
      <span class="nt-lbl">Home</span><div class="nt-pip"></div>
    </div>
    <div class="nt" data-tab="journal" onclick="goTab('journal')">
      <div class="nt-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor"/><path d="M8 7h8M8 11h8M8 15h5" stroke="currentColor"/></svg></div>
      <span class="nt-lbl">Journal</span><div class="nt-pip"></div>
    </div>
    <div class="nt" data-tab="write" onclick="openWrite(null)">
      <div class="nt-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round"><path d="M12 20h9" stroke="currentColor"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor"/></svg></div>
      <span class="nt-lbl">Write</span><div class="nt-pip"></div>
    </div>
    <div class="nt" data-tab="notes" onclick="goTab('notes')">
      <div class="nt-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor"/></svg></div>
      <span class="nt-lbl">Notes</span><div class="nt-pip"></div>
    </div>
    <div class="nt" data-tab="me" onclick="goTab('me')">
      <div class="nt-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor"/><circle cx="12" cy="7" r="4" stroke="currentColor"/></svg></div>
      <span class="nt-lbl">Me</span><div class="nt-pip"></div>
    </div>
  </nav>
</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  STATE & STORAGE
// ══════════════════════════════════════════════
const DB = {
  get(k, def){ try{ const v=localStorage.getItem('iw_'+k); return v!=null?JSON.parse(v):def; }catch{ return def; } },
  set(k,v){ try{ localStorage.setItem('iw_'+k,JSON.stringify(v)); }catch(e){ toast('Storage full – export your data'); } }
};

let APP = {

const PAGE_TITLES = {home:'Inkwell',journal:'Journal',write:'New Entry',notes:'Notes',gallery:'Gallery',progress:'Progress',insights:'Insights',me:'Profile'};

function goTab(tab){
  APP.tab = tab;
  document.querySelectorAll('.nt').forEach(n=>{
    const on = n.dataset.tab === tab;
    n.classList.toggle('on', on);
    n.style.color = on ? 'var(--Au)' : 'var(--f3)';
  });
  document.getElementById('tb-title').textContent = PAGE_TITLES[tab]||tab;
  document.getElementById('tb').classList.toggle('lined', tab!=='home');
  document.getElementById('tb-right').innerHTML = tab==='journal'
    ? `<button class="ib" onclick="document.getElementById('page').querySelector('.srch-inp')?.focus()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="8" stroke="var(--f2)"/><path d="m21 21-4.35-4.35" stroke="var(--f2)"/></svg></button>` : '';
  renderPage();
}

function renderPage(){
  const p = document.getElementById('page');
  p.className = 'fade';
  const r = {home:renderHome, journal:renderJournal, notes:renderNotes, gallery:renderGallery, progress:renderProgress, insights:renderInsights, me:renderMe};
  p.innerHTML = (r[APP.tab]||renderHome)();
  afterRender();
}

function afterRender(){
  // toggle notes fab
  const fab = document.getElementById('note-fab');
  if(fab && APP.tab==='notes'){ fab.style.display='flex'; fab.style.opacity='1'; }
}

function delEntry(id){
  if(!confirm('Delete this entry?')) return;
  APP.entries = APP.entries.filter(e=>e.id!==id);
  saveAll();
  document.getElementById('entry-detail')?.remove();
  renderPage();
  toast('Entry deleted');
}

function viewPhoto(src){
  const v = document.createElement('div');
  v.id = 'photo-viewer';
  v.innerHTML = `<img src="${src}"><div id="photo-viewer-close" onclick="document.getElementById('photo-viewer').remove()">✕</div>`;
  document.body.appendChild(v);
}

function playRecording(dataUrl, btn){
  const audio = new Audio(dataUrl);
  btn.textContent = '⏸';
  audio.play();
  audio.onended = () => { btn.textContent = '▶'; };
  audio.onerror = () => { btn.textContent = '▶'; toast('Could not play audio'); };
}

function fmtDur(s){
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function renderJournal(){
  const filts = ['All','Serene','Proud','Reflective','Heavy','Has Photos','Has Audio'];
  let data = APP.entries.filter(e=>{
    if(APP.filt==='Has Photos') return e.photos?.length>0;
    if(APP.filt==='Has Audio') return e.recordings?.length>0;
    if(APP.filt!=='All') return e.mood===APP.filt;
    if(APP.search) return e.title.toLowerCase().includes(APP.search.toLowerCase())||e.body.toLowerCase().includes(APP.search.toLowerCase());
    return true;
  });
  const grouped = {};
  data.forEach(e=>{ if(!grouped[e.month]) grouped[e.month]=[]; grouped[e.month].push(e); });
  return `
  <div class="srch-bar"><div class="srch-inner"><span class="srch-ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="8" stroke="currentColor"/><path d="m21 21-4.35-4.35" stroke="currentColor"/></svg></span><input class="srch-inp" placeholder="Search entries, moods, places…" value="${APP.search}" oninput="APP.search=this.value;renderPage()"></div></div>
  <div class="filt-row">${filts.map(f=>`<div class="fp${APP.filt===f?' on':''}" onclick="APP.filt='${f}';renderPage()">${f}</div>`).join('')}</div>
  ${!data.length ? `<div class="empty">No entries found.<br><span onclick="openWrite(null)">✦ Write your first entry →</span></div>` : ''}
  ${Object.entries(grouped).map(([m,es])=>`<div class="mdlbl">${m}</div><div class="block">${es.map(entryItem).join('')}</div>`).join('')}
  `;
}

  const editing = editId ? APP.entries.find(e=>e.id===editId) : null;
  WS = {
    id: editing?.id||null,
    title: editing?.title||'',
    body: editing?.body||'',
    mood: editing?.mood||null,
    moodColor: editing?.moodColor||null,
    tags: [...(editing?.tags||[])],
    photos: [...(editing?.photos||[])], // array of base64 dataURLs
    recordings: [...(editing?.recordings||[])], // array of {data, duration}
    journal: JOURNALS.find(j=>j.id===editing?.journal)||JOURNALS[0],
    location: editing?.location||'',
    weather: editing?.weather||'',
    saved: false,
  };
  REC = { stream:null, recorder:null, chunks:[], startTime:null, timer:null, duration:0 };

  const panel = document.createElement('div');

// Photo handling
function triggerPhoto(){

function triggerPhotoLib(){

function handlePhotoInput(e){
  const files = Array.from(e.target.files||[]);
  if(!files.length) return;
  const promises = files.map(f=>new Promise(res=>{
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.readAsDataURL(f);
  }));
  Promise.all(promises).then(results=>{
    WS.photos.push(...results);
    const strip = document.getElementById('photo-strip');
    if(strip) strip.innerHTML = renderPhotoStrip();
    toast(`${results.length} photo${results.length>1?'s':''} attached`);
  });
  e.target.value = '';
}

// Voice recording
async function toggleRec(){
  if(!REC.recorder || REC.recorder.state==='inactive'){
    await startRec();
  } else {
    stopRec();
  }
}

async function startRec(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    REC.stream = stream;
    REC.chunks = [];
    REC.startTime = Date.now();
    REC.duration = 0;
    const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?{mimeType:'audio/webm;codecs=opus'}:
                 MediaRecorder.isTypeSupported('audio/mp4')?{mimeType:'audio/mp4'}:{};
    REC.recorder = new MediaRecorder(stream, opts);
    REC.recorder.ondataavailable = e=>{ if(e.data.size>0) REC.chunks.push(e.data); };
    REC.recorder.onstop = processRec;
    REC.recorder.start(100);

    // UI
    const vbtn=document.getElementById('vbtn'), vdot=document.getElementById('vdot');
    const vit=document.getElementById('vi-t'), vis=document.getElementById('vi-s');
    const vwa=document.getElementById('vwaves-area'), rtm=document.getElementById('rec-timer');
    if(vbtn){vbtn.classList.add('rec');}
    if(vdot){vdot.classList.add('rec');}
    if(vit)vit.textContent='Recording…';
    if(vis)vis.textContent='Tap to stop';
    if(vwa)vwa.innerHTML='<div class="vwaves"><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div></div>';
    if(rtm){rtm.style.display='block';}
    REC.timer = setInterval(()=>{
      REC.duration = Math.floor((Date.now()-REC.startTime)/1000);
      if(rtm) rtm.textContent = fmtDur(REC.duration);
    }, 1000);
  } catch(err){
    toast('Mic access denied — allow microphone in settings');
  }
}

function stopRec(){
  if(REC.recorder && REC.recorder.state!=='inactive') REC.recorder.stop();
  REC.stream?.getTracks().forEach(t=>t.stop());
  clearInterval(REC.timer);
  const vbtn=document.getElementById('vbtn'),vdot=document.getElementById('vdot');
  const vit=document.getElementById('vi-t'),vis=document.getElementById('vi-s');
  const vwa=document.getElementById('vwaves-area'),rtm=document.getElementById('rec-timer');
  if(vbtn)vbtn.classList.remove('rec');
  if(vdot)vdot.classList.remove('rec');
  if(vit)vit.textContent='Voice note';
  if(vis)vis.textContent='Tap to start recording';
  if(vwa)vwa.innerHTML='';
  if(rtm)rtm.style.display='none';
}

function processRec(){
  if(!REC.chunks.length) return;
  const blob = new Blob(REC.chunks, {type: REC.recorder.mimeType||'audio/webm'});
  const reader = new FileReader();
  reader.onload = ev=>{
    WS.recordings.push({data: ev.target.result, duration: REC.duration});
    const vr = document.getElementById('vrecs');
    if(vr) vr.innerHTML = renderRecordings();
    toast('Voice note saved');
    REC.chunks=[];
  };
  reader.readAsDataURL(blob);
}

// Formatting
function iFmt(pre,post){
  const ta=document.getElementById('wr-b'); if(!ta) return;
  const s=ta.selectionStart, e=ta.selectionEnd, v=ta.value;
  ta.value=v.substring(0,s)+pre.replace(/\\n/g,'\n')+v.substring(s,e)+post+v.substring(e);
  const newPos = s+pre.replace(/\\n/g,'\n').length+v.substring(s,e).length;
  ta.selectionStart=ta.selectionEnd=newPos;
  WS.body=ta.value; ta.focus();

// Save
function saveEntry(){
  const title = document.getElementById('wr-t')?.value || WS.title;
  const body = document.getElementById('wr-b')?.value || WS.body;
  if(!title.trim()&&!body.trim()){ toast('Write something first'); return; }

  const wc = body.trim() ? body.trim().split(/\s+/).length : 0;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
  const month = now.toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase();

  const entry = {
    id: WS.id || Date.now(),
    date: WS.id ? APP.entries.find(e=>e.id===WS.id)?.date||dateStr : dateStr,
    month, title: title||'Untitled', body: body||'',
    mood: WS.mood||'', moodColor: WS.moodColor||'#888',
    words: wc, tags: WS.tags, photos: WS.photos,
    recordings: WS.recordings, journal: WS.journal.id,
    location: WS.location||'', weather: WS.weather||''
  };

  if(WS.id){ APP.entries = APP.entries.map(e=>e.id===WS.id?entry:e); }
  else { APP.entries.unshift(entry); }
  saveAll();

  const btn = document.getElementById('save-btn');
  if(btn){ btn.textContent='✓ Saved'; btn.classList.add('done'); WS.saved=true; }
  toast('Entry saved');
  setTimeout(closeWrite, 1100);
}

  const tot=APP.entries.length;
  const avgW=tot>0?Math.round(APP.entries.reduce((a,e)=>a+(e.words||0),0)/tot):0;
  const moodCounts={};
  APP.entries.forEach(e=>{if(e.mood)moodCounts[e.mood]=(moodCounts[e.mood]||0)+1;});
  const topMood=Object.entries(moodCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  const md=[{l:'Serene',p:38,c:'#5c7e9e'},{l:'Grateful',p:28,c:'#bf8c52'},{l:'Reflective',p:18,c:'#7c5c9e'},{l:'Heavy',p:16,c:'#6a6870'}];
  const ws=[{w:'growth',s:2},{w:'clarity',s:1},{w:'rest',s:0},{w:'work',s:0},{w:'family',s:2},{w:'gratitude',s:1},{w:'identity',s:2},{w:'change',s:1},{w:'purpose',s:2},{w:'solitude',s:0},{w:'joy',s:1}];
  return `
  <div class="ins-4">
    ${[{v:tot,l:'Total entries'},{v:avgW,l:'Avg words'},{v:'6 am',l:'Peak writing hour'},{v:topMood,l:'Top mood'}].map(s=>`<div class="is"><div class="is-v">${s.v}</div><div class="is-l">${s.l}</div></div>`).join('')}
  </div>
  <div class="sec-head" style="padding-top:18px"><span class="sec-lbl">Mood Breakdown</span></div>
  ${md.map(m=>`<div class="mb-row"><div class="mb-n">${m.l}</div><div class="mb-bg"><div class="mb-f" style="width:${m.p}%;background:${m.c}"></div></div><div class="mb-p">${m.p}%</div></div>`).join('')}
  <div class="sec-head"><span class="sec-lbl">Patterns</span></div>
  ${[{i:'↗',t:'Emotional Trend',b:`Mood trended <span class="ic-hl">upward for 3 weeks</span>. Positive entries up 24%.`},{i:'↺',t:'Recurring Themes',b:`Sleep quality appears in <span class="ic-hl">34% of entries</span>. Post-exercise entries are consistently more positive.`},{i:'✎',t:'Writing Style',b:`Introspective and narrative. Vocabulary richness: <span class="ic-hl">high</span>. Average sentence: 14 words.`},{i:'▣',t:'Visual Memory',b:`<span class="ic-hl">${APP.entries.reduce((a,e)=>a+(e.photos?.length||0),0)} photos</span> attached across all entries.`},{i:'🎙',t:'Voice Notes',b:`<span class="ic-hl">${APP.entries.reduce((a,e)=>a+(e.recordings?.length||0),0)} voice recordings</span> captured. Your richest entries use multiple media types.`}].map(c=>`<div class="icard"><div class="ic-head"><div class="ic-ico">${c.i}</div><div class="ic-t">${c.t}</div></div><div class="ic-b">${c.b}</div></div>`).join('')}
  <div class="sec-head"><span class="sec-lbl">Your Themes</span></div>
  <div class="theme-wrap">${ws.map(({w,s})=>`<div class="tw${s===1?' lg':s===2?' xl':''}">${w}</div>`).join('')}</div>
  `;
}

// ══════════════════════════════════════════════
//  ME / SETTINGS
// ══════════════════════════════════════════════
function renderMe(){
  const tw=APP.entries.reduce((a,e)=>a+(e.words||0),0);
  const s=APP.settings;
  const tData=[
    {key:'dark',name:'Dark',swatches:['#0a0a0c','#111115','#c8914e','#ede8e0']},
    {key:'light',name:'Light',swatches:['#f4f2ee','#ffffff','#9e6e38','#1c1a16']},
    {key:'sepia',name:'Sepia',swatches:['#1c1710','#241e14','#c8a060','#f0e8d8']},
    {key:'midnight',name:'Midnight',swatches:['#060812','#0c0e1c','#8a9ee0','#dce0f4']},
  ];
  return `
  <div class="prof-block">
    <div class="prof-av">${APP.name.charAt(0).toUpperCase()}</div>
    <div style="flex:1">
      <div class="prof-name">${APP.name}</div>
      <div class="prof-plan">Inkwell Pro</div>
      <div class="prof-since">Member since January 2026</div>
    </div>
    <button class="prof-edit" onclick="editName()">Edit</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:16px 20px 0">
    ${[{v:42,l:'Day streak',c:'Au'},{v:APP.entries.length,l:'Entries',c:'gr'},{v:tw>=1000?(Math.round(tw/100)/10)+'k':tw,l:'Words',c:'bl'},{v:APP.notes.length,l:'Notes',c:'f2'}].map(s=>`<div style="padding:13px;background:var(--s1);border:1px solid var(--ln);border-radius:13px;text-align:center;transition:background .3s"><div style="font-family:'DM Mono',monospace;font-size:24px;color:var(--${s.c});line-height:1">${s.v}</div><div style="font-size:10px;color:var(--f3);margin-top:5px;letter-spacing:.06em">${s.l}</div></div>`).join('')}
  </div>

  <!-- Journals -->
  <div class="sgrp">
    <div class="sgrp-lbl">Journals</div>
    <div class="block">
      ${JOURNALS.map(j=>`<div class="jrow"><div class="jdot" style="background:${j.color}"></div><div class="jname">${j.name}</div><div class="jcnt">${APP.entries.filter(e=>e.journal===j.id).length} entries ›</div></div>`).join('')}
      <div class="jrow" style="border-bottom:none"><div class="jdot" style="background:var(--f4);opacity:.4"></div><div class="jname" style="color:var(--f3)">New journal</div><div class="jcnt" style="color:var(--Au)">+ Create ›</div></div>
    </div>
  </div>

  <!-- Theme -->
  <div class="sgrp">
    <div class="sgrp-lbl">Appearance</div>
    <div class="theme-grid">
      ${tData.map(t=>`<div class="topt${APP.theme===t.key?' sel':''}" onclick="changeTheme('${t.key}')">
        <div class="topt-top"><span class="topt-name">${t.name}</span><div class="tchk${APP.theme===t.key?' sel':''}">${APP.theme===t.key?'✓':''}</div></div>
        <div class="tswatches">${t.swatches.map(c=>`<div class="tswatch" style="background:${c};border:1px solid rgba(128,128,128,.2)"></div>`).join('')}</div>
      </div>`).join('')}
    </div>
    <div class="block" style="margin-top:2px">
      <div class="srow" onclick="setGoal()"><div style="flex:1"><div class="srow-lbl">Daily writing goal</div><div class="srow-sub">Current: ${APP.goal} words</div></div><div class="sright"><span class="sval">${APP.goal}w</span><span class="sarr">›</span></div></div>
      <div class="srow" style="border-bottom:none" onclick="editName()"><div style="flex:1"><div class="srow-lbl">Display name</div><div class="srow-sub">${APP.name}</div></div><div class="sright"><span class="sarr">›</span></div></div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="sgrp">
    <div class="sgrp-lbl">Notifications</div>
    <div class="block">
      ${[{l:'Daily reminder',sub:'8:00 PM — every day',k:'rem'},{l:'Streak alerts',sub:'Before losing your streak',k:'streak'},{l:'Weekly summary',sub:'Email digest on Sundays',k:'weekly'}].map(r=>`<div class="srow"><div style="flex:1"><div class="srow-lbl">${r.l}</div><div class="srow-sub">${r.sub}</div></div><div class="sright"><div class="tgl${s[r.k]?' on':''}" id="t-${r.k}" onclick="toggleS('${r.k}')"></div></div></div>`).join('')}
    </div>
  </div>

  <!-- Security -->
  <div class="sgrp">
    <div class="sgrp-lbl">Security & Privacy</div>
    <div class="block">
      ${[{l:'Face ID / Biometrics',sub:'Lock app on close',k:'faceID'},{l:'End-to-end encryption',sub:'All entries encrypted locally',k:'enc'},{l:'Private mode',sub:'Hide previews in app switcher',k:'priv',badge:'<span class="badge new">New</span>'}].map(r=>`<div class="srow"><div style="flex:1"><div class="srow-lbl">${r.l}</div>${r.sub?`<div class="srow-sub">${r.sub}</div>`:''}</div><div class="sright">${r.badge||''}<div class="tgl${s[r.k]?' on':''}" id="t-${r.k}" onclick="toggleS('${r.k}')"></div></div></div>`).join('')}
    </div>
  </div>

  <!-- Data -->
  <div class="sgrp">
    <div class="sgrp-lbl">Data & Backup</div>
    <div class="block">
      <div class="srow"><div style="flex:1"><div class="srow-lbl">Backup to cloud</div><div class="srow-sub">Auto-sync enabled</div></div><div class="sright"><div class="tgl${s.backup?' on':''}" onclick="toggleS('backup')"></div></div></div>
      <div class="srow" onclick="exportData()"><div style="flex:1"><div class="srow-lbl">Export all data</div><div class="srow-sub">Download as JSON file</div></div><div class="sright"><span class="sarr">›</span></div></div>
      <div class="srow" onclick="importData()"><div style="flex:1"><div class="srow-lbl">Import data</div><div class="srow-sub">Restore from JSON backup</div></div><div class="sright"><span class="sarr">›</span></div></div>
      <div class="srow" style="border-bottom:none" onclick="clearData()"><div style="flex:1"><div class="srow-lbl" style="color:var(--re)">Delete all data</div><div class="srow-sub">Permanently erase everything</div></div><div class="sright"><span class="sarr" style="color:var(--re)">›</span></div></div>
    </div>
  </div>

  <!-- Subscription -->
  <div class="sgrp">
    <div class="sgrp-lbl">Subscription</div>
    <div class="block">
      <div class="srow"><div style="flex:1"><div class="srow-lbl">Inkwell Pro</div><div class="srow-sub">Renews Apr 24, 2026 · $4.99/mo</div></div><div class="sright"><span class="badge pro">Pro</span><span class="sarr">›</span></div></div>
      <div class="srow" style="border-bottom:none"><div style="flex:1"><div class="srow-lbl">Refer a friend</div><div class="srow-sub">Get 1 month free</div></div><div class="sright"><span class="badge new">Earn</span><span class="sarr">›</span></div></div>
    </div>
  </div>

  <!-- About -->
  <div class="sgrp">
    <div class="sgrp-lbl">About</div>
    <div class="block">
      ${['Privacy Policy','Terms of Service','Rate Inkwell','Send Feedback'].map((l,i,a)=>`<div class="srow"${i===a.length-1?' style="border-bottom:none"':''}><div class="srow-lbl">${l}</div><span class="sarr">›</span></div>`).join('')}
    </div>
  </div>
  <div class="signout" onclick="if(confirm('Sign out of Inkwell?'))toast('Signed out')">Sign out</div>
  <div class="ver">Inkwell · v3.0 · ${THEMES[APP.theme]?.name||'Dark'} theme</div>
  `;
}

function toggleS(k){ APP.settings[k]=!APP.settings[k]; saveAll(); const el=document.getElementById('t-'+k); if(el)el.classList.toggle('on',APP.settings[k]); }
function changeTheme(t){ applyTheme(t); renderPage(); }
function editName(){ const n=prompt('Your first name:',APP.name); if(n&&n.trim()){ APP.name=n.trim(); DB.set('name',APP.name); renderPage(); toast('Name updated'); } }
function setGoal(){ const g=parseInt(prompt('Daily writing goal (words):',APP.goal)); if(g&&g>0){ APP.goal=g; DB.set('goal',g); renderPage(); toast('Goal updated to '+g+' words'); } }
function exportData(){
  const blob=new Blob([JSON.stringify({entries:APP.entries,notes:APP.notes,settings:APP.settings,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='inkwell-export-'+Date.now()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('Data exported successfully');
}
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(d.entries)APP.entries=d.entries; if(d.notes)APP.notes=d.notes; saveAll(); renderPage(); toast('Data imported — '+d.entries?.length+' entries'); }catch{ toast('Invalid backup file'); } };
    r.readAsText(f);
  };
  inp.click();
}
function clearData(){ if(confirm('Delete ALL entries, notes and settings? This cannot be undone.')){ APP.entries=[]; APP.notes=[]; APP.settings={rem:true,streak:true,weekly:false,faceID:true,enc:true,priv:false,backup:false}; saveAll(); renderPage(); toast('All data cleared'); } }

// ══════════════════════════════════════════════
//  DRAWER
// ══════════════════════════════════════════════
function openDrawer(){
  if(document.getElementById('drw')) return;
  const bg=document.createElement('div'); bg.id='drw-bg'; bg.onclick=closeDrawer;
  const drw=document.createElement('div'); drw.id='drw';
  const nav=[
    {id:'home',ico:'⌂',l:'Home'},{id:'journal',ico:'≡',l:'Journal'},{id:'write',ico:'✎',l:'New Entry'},
    null,
    {id:'notes',ico:'◻',l:'Notes'},{id:'gallery',ico:'▣',l:'Gallery'},
    null,
    {id:'progress',ico:'◎',l:'Progress'},{id:'insights',ico:'◉',l:'Insights'},
    null,
    {id:'me',ico:'◯',l:'Profile & Settings'},
  ];
  const tw=APP.entries.reduce((a,e)=>a+(e.words||0),0);
  drw.innerHTML=`
    <div class="drw-top">
      <div class="drw-av">${APP.name.charAt(0).toUpperCase()}</div>
      <div class="drw-name">${APP.name}</div>
      <div class="drw-sub">✦ Inkwell Pro</div>
      <div class="drw-stats">
        <div><div class="dsv">42</div><div class="dsl">Streak</div></div>
        <div><div class="dsv">${APP.entries.length}</div><div class="dsl">Entries</div></div>
        <div><div class="dsv">${APP.notes.length}</div><div class="dsl">Notes</div></div>
      </div>
    </div>
    <div class="drw-nav">
      ${nav.map((item,i)=>item===null?`<div class="drw-sep"></div>`:`<div class="drw-it${APP.tab===item.id?' on':''}" onclick="drawerGo('${item.id}')"><div class="drw-it-ico">${item.ico}</div><div class="drw-it-lbl">${item.l}</div></div>`).join('')}
    </div>
    <div class="drw-foot">
      <div class="drw-signout" onclick="if(confirm('Sign out?'))toast('Signed out')">Sign out</div>
      <div class="drw-ver">Inkwell v3.0</div>
    </div>
  `;
  document.getElementById('screen').appendChild(bg);
  document.getElementById('screen').appendChild(drw);
}

function closeDrawer(){ document.getElementById('drw-bg')?.remove(); document.getElementById('drw')?.remove(); }
function drawerGo(tab){ closeDrawer(); if(tab==='write')openWrite(null); else goTab(tab); }

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let _toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
applyTheme(APP.theme);
goTab('home');

// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js',{scope:'/'})
      .then(()=>console.log('✦ Inkwell SW registered'))
      .catch(e=>console.warn('SW fail:',e));
  });
}

// Prevent bounce scroll on iOS
document.addEventListener('touchmove', e=>{ if(e.target===document.body)e.preventDefault(); }, {passive:false});
// Prevent context menu on long press
document.addEventListener('contextmenu', e=>e.preventDefault());
// Handle Android back
window.addEventListener('popstate',()=>{
  if(document.getElementById('write-panel'))closeWrite();
  else if(document.getElementById('note-panel')){document.getElementById('note-panel')?.remove();}
  else if(document.getElementById('entry-detail')){document.getElementById('entry-detail')?.remove();}
  else if(document.getElementById('drw'))closeDrawer();
  else if(document.getElementById('modal-bg')){document.getElementById('modal-bg')?.remove();}
  else if(document.getElementById('photo-viewer')){document.getElementById('photo-viewer')?.remove();}
});
</script>
</body>
