<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Inkwell"/>
<meta name="theme-color" content="#0a0a0c" id="tcm"/>
<title>Inkwell Journal</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230a0a0c'/%3E%3Ctext x='90' y='122' font-size='108' text-anchor='middle' fill='%23c8914e'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

:root{
  --bg:#0a0a0c;--s1:#111115;--s2:#18181e;--s3:#202028;--s4:#2a2a35;
  --ln:#24242e;--ln2:#32323e;
  --Au:#c8914e;--AuL:#e0aa68;--AuD:#7a5830;--Aub:rgba(200,145,78,.12);
  --fg:#ede8e0;--f2:#9896a2;--f3:#585664;--f4:#383644;
  --gr:#5a9e74;--bl:#5a7e9e;--re:#9e5a5a;--pu:#7a5c9e;
  --nav:rgba(10,10,14,.96);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
[data-t=light]{--bg:#f4f2ee;--s1:#fff;--s2:#ede9e3;--s3:#e4dfd8;--s4:#d8d2c8;--ln:#e0dbd2;--ln2:#ccc6bc;--Au:#9e6e38;--AuL:#b88040;--AuD:#7a5428;--Aub:rgba(158,110,56,.1);--fg:#1c1a16;--f2:#5c5850;--f3:#8a8680;--f4:#aca8a2;--gr:#3a7e58;--bl:#3a5e7e;--re:#7e3a3a;--nav:rgba(244,242,238,.96);}
[data-t=sepia]{--bg:#1c1710;--s1:#241e14;--s2:#2c261a;--s3:#342e22;--s4:#3e362a;--ln:#3a3228;--ln2:#4a4238;--Au:#c8a060;--AuL:#e0b878;--AuD:#8a6c2e;--Aub:rgba(200,160,96,.1);--fg:#f0e8d8;--f2:#b0a898;--f3:#706858;--f4:#504840;--gr:#6a9e78;--bl:#6a8e9e;--re:#9e6a5a;--nav:rgba(28,23,16,.96);}
[data-t=midnight]{--bg:#060812;--s1:#0c0e1c;--s2:#121628;--s3:#181e34;--s4:#20263e;--ln:#1e2434;--ln2:#28304a;--Au:#8a9ee0;--AuL:#a0b0f0;--AuD:#5a6aaa;--Aub:rgba(138,158,224,.1);--fg:#dce0f4;--f2:#8890aa;--f3:#505872;--f4:#343854;--gr:#5a9e8a;--bl:#5a7eaa;--re:#9e5a6c;--nav:rgba(6,8,18,.96);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--fg);transition:background .25s,color .25s;}
input,textarea,button{font-family:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}
textarea{resize:none;}

/* ── SHELL ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}

/* ── TOPBAR ── */
#tb{
  display:flex;align-items:center;gap:8px;
  padding:calc(var(--sat)+12px) 18px 10px;
  background:var(--bg);border-bottom:1px solid transparent;
  flex-shrink:0;z-index:60;transition:border-color .2s,background .25s;
}
#tb.lined{border-bottom-color:var(--ln);}
.ham{display:flex;flex-direction:column;gap:5px;width:36px;height:36px;justify-content:center;align-items:flex-start;border-radius:9px;transition:background .12s;padding:0 8px;}
.ham:active{background:var(--s3);}
.hl{height:1px;background:var(--f2);border-radius:99px;}
#tb-title{flex:1;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;color:var(--fg);}
#tb-right{display:flex;align-items:center;gap:4px;}
.ib{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:background .12s;color:var(--f2);}
.ib:active{background:var(--s3);}

/* ── PAGE ── */
#screen{flex:1;position:relative;overflow:hidden;}
#page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sab)+72px);}
#page::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
#bnav{
  flex-shrink:0;display:flex;align-items:flex-start;
  padding:8px 4px calc(var(--sab)+6px);
  background:var(--nav);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--ln);z-index:60;
  transition:background .25s,border-color .25s;
}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;user-select:none;transition:opacity .1s;}
.nt:active{opacity:.6;}
.nt svg{display:block;}
.nt-l{font-size:9.5px;font-weight:500;letter-spacing:.03em;color:var(--f3);transition:color .2s;}
.nt.on .nt-l{color:var(--Au);}
.nt-p{width:3px;height:3px;border-radius:50%;background:var(--Au);opacity:0;transition:opacity .2s;margin-top:1px;}
.nt.on .nt-p{opacity:1;}

/* ── ANIMS ── */
.fade{animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.su{animation:su .26s cubic-bezier(.32,1,.64,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sl{animation:sl .26s cubic-bezier(.32,1,.64,1);}
@keyframes sl{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* ── DRAWER ── */
#dbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;backdrop-filter:blur(6px);animation:fade .18s;}
#drw{position:fixed;top:0;left:0;bottom:0;width:min(288px,82vw);background:var(--s1);border-right:1px solid var(--ln);z-index:201;display:flex;flex-direction:column;animation:sl .25s cubic-bezier(.32,1,.64,1);transition:background .25s;}
.dtop{padding:calc(var(--sat)+42px) 22px 18px;border-bottom:1px solid var(--ln);}
.dav{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--AuD),var(--Au));display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:#1a1000;margin-bottom:12px;}
.dname{font-family:'Libre Baskerville',serif;font-size:21px;font-weight:400;color:var(--fg);}
.dplan{font-size:11px;color:var(--Au);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.dstats{display:flex;gap:18px;margin-top:12px;}
.dsv{font-family:'DM Mono',monospace;font-size:19px;color:var(--fg);line-height:1;}
.dsl{font-size:9.5px;color:var(--f3);margin-top:2px;letter-spacing:.06em;}
.dnav{flex:1;overflow-y:auto;padding:10px 0;}
.dnav::-webkit-scrollbar{display:none;}
.dsec{font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--f4);padding:12px 22px 4px;}
.di{display:flex;align-items:center;gap:13px;padding:11px 22px;cursor:pointer;transition:background .12s;}
.di:active{background:var(--s2);}
.di.on{background:var(--Aub);}
.di-ico{width:18px;text-align:center;font-size:14px;color:var(--f3);}
.di.on .di-ico{color:var(--Au);}
.di-l{font-size:13.5px;color:var(--f2);}
.di.on .di-l{color:var(--Au);}
.dsep{height:1px;background:var(--ln);margin:7px 0;}
.dfoot{padding:14px 22px calc(var(--sab)+18px);border-top:1px solid var(--ln);}
.dso{font-size:13px;color:var(--re);cursor:pointer;padding:7px 0;}
.dver{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);margin-top:6px;}

/* ── PANEL (overlays) ── */
.panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transition:background .25s;}
.ph{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(var(--sat)+12px) 18px 10px;border-bottom:1px solid var(--ln);flex-shrink:0;}
.ph-lft{display:flex;align-items:center;gap:10px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--Au);font-size:13.5px;font-weight:500;cursor:pointer;}
.ph-title{font-family:'Libre Baskerville',serif;font-size:18px;color:var(--fg);}
.ph-rgt{display:flex;align-items:center;gap:8px;}
.btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.01em;}
.btn-p{background:var(--Au);color:#1a1000;}
.btn-p:active,.btn-p:hover{opacity:.88;}
.btn-p.ok{background:var(--gr);}
.btn-g{background:transparent;color:var(--f2);border:1px solid var(--ln);}
.btn-d{background:transparent;color:var(--re);border:1px solid rgba(158,90,90,.3);}
.pscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pscroll::-webkit-scrollbar{display:none;}

/* ── UTILS ── */
.blk{background:var(--s1);border-top:1px solid var(--ln);border-bottom:1px solid var(--ln);margin-bottom:2px;transition:background .25s;}
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 6px;}
.sl2{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);}
.slink{font-size:12px;color:var(--Au);font-weight:500;cursor:pointer;}
.mdl{padding:13px 20px 5px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--f4);letter-spacing:.12em;text-transform:uppercase;}
.empty{text-align:center;padding:48px 24px;color:var(--f4);font-size:14px;line-height:1.9;}
.empty a{color:var(--Au);cursor:pointer;text-decoration:none;}

/* ── HOME ── */
.hero{padding:20px 20px 0;}
.hero-date{font-size:11px;color:var(--f3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
.hero-name{font-family:'Libre Baskerville',serif;font-size:33px;font-weight:400;color:var(--fg);line-height:1.1;letter-spacing:-.01em;}
.hero-name em{font-style:italic;color:var(--Au);}
.scards{display:flex;gap:8px;padding:14px 20px 0;}
.sc{flex:1;background:var(--s1);border:1px solid var(--ln);border-radius:13px;padding:12px 8px;text-align:center;position:relative;overflow:hidden;transition:background .25s;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.a::before{background:linear-gradient(90deg,var(--Au),transparent);}
.sc.b::before{background:linear-gradient(90deg,var(--gr),transparent);}
.sc.c::before{background:linear-gradient(90deg,var(--bl),transparent);}
.sc.d::before{background:linear-gradient(90deg,var(--pu),transparent);}
.scv{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;line-height:1;}
.sc.a .scv{color:var(--Au);}
.sc.b .scv{color:var(--gr);}
.sc.c .scv{color:var(--bl);}
.sc.d .scv{color:var(--pu);}
.scl{font-size:9px;color:var(--f3);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
.otd{margin:14px 20px 0;background:var(--s1);border:1px solid var(--ln);border-left:3px solid var(--Au);border-radius:0 13px 13px 0;padding:14px 16px;cursor:pointer;transition:background .12s;}
.otd:active{background:var(--s2);}
.otd-e{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--Au);margin-bottom:5px;}
.otd-t{font-family:'Libre Baskerville',serif;font-size:16.5px;color:var(--fg);line-height:1.3;margin-bottom:4px;}
.otd-p{font-size:12.5px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.otd-m{font-family:'DM Mono',monospace;font-size:10px;color:var(--f3);margin-top:7px;}
.qcard{margin:14px 20px 0;padding:14px 0;border-top:1px solid var(--ln);border-bottom:1px solid var(--ln);}
.qt{font-family:'Libre Baskerville',serif;font-size:15px;font-style:italic;color:var(--f2);line-height:1.65;}
.qa{font-size:10px;color:var(--f3);margin-top:7px;letter-spacing:.08em;}
.act-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;}
.ag{aspect-ratio:1;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8.5px;color:var(--f4);transition:background .25s;}
.ag.w{background:var(--Aub);color:var(--Au);}
.ag.td{background:var(--Au);color:#1a1000;font-weight:700;}

/* ── ENTRY ITEM ── */
.ei{padding:14px 20px;border-bottom:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.ei:last-child{border-bottom:none;}
.ei:active{background:var(--s2);}
.ei-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ei-l{display:flex;align-items:center;gap:7px;}
.eidot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.eidate{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);letter-spacing:.04em;}
.eimeta{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);}
.eititle{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;color:var(--fg);line-height:1.2;margin-bottom:4px;}
.eiprev{font-size:13px;color:var(--f2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.eifoot{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap;}
.mbadge{font-size:11px;padding-left:7px;border-left:2px solid;}
.chip{padding:2px 8px;border-radius:5px;background:var(--s3);font-size:10px;color:var(--f3);}

/* ── ENTRY DETAIL ── */
.ed-title{font-family:'Libre Baskerville',serif;font-size:27px;font-weight:400;color:var(--fg);line-height:1.15;padding:18px 20px 12px;}
.echips{display:flex;gap:7px;padding:0 20px 14px;flex-wrap:wrap;}
.ech{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;background:var(--s2);border:1px solid var(--ln);font-size:11px;color:var(--f3);}
.ecd{width:5px;height:5px;border-radius:50%;}
.ed-para{font-size:15px;color:var(--f2);line-height:1.85;font-weight:300;padding:0 20px;margin-bottom:14px;}
.ed-sec{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);padding:14px 20px 8px;}
.ed-photos{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px;}
.ed-photos::-webkit-scrollbar{display:none;}
.ed-photo{width:96px;height:96px;border-radius:12px;flex-shrink:0;overflow:hidden;border:1px solid var(--ln);cursor:pointer;}
.ed-photo img{width:100%;height:100%;object-fit:cover;}
.audio-cards{padding:0 20px 16px;display:flex;flex-direction:column;gap:8px;}
.acard{background:var(--s2);border:1px solid var(--ln);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.aplay{width:36px;height:36px;border-radius:50%;background:var(--Au);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.aplay-ic{width:0;height:0;border-style:solid;border-width:6px 0 6px 11px;border-color:transparent transparent transparent #1a1000;margin-left:2px;}
.a-info{flex:1;}
.a-lbl{font-size:13px;font-weight:500;color:var(--fg);}
.a-dur{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--f3);margin-top:2px;}

/* ── SEARCH ── */
.sbar{padding:10px 20px;border-bottom:1px solid var(--ln);}
.sinner{position:relative;}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--f3);}
.sinp{width:100%;background:var(--s2);border:1px solid var(--ln);border-radius:11px;padding:10px 14px 10px 38px;color:var(--fg);font-size:14px;outline:none;transition:border-color .15s;}
.sinp::placeholder{color:var(--f4);}
.sinp:focus{border-color:var(--Au);}
.frow{display:flex;gap:7px;padding:9px 20px;border-bottom:1px solid var(--ln);overflow-x:auto;}
.frow::-webkit-scrollbar{display:none;}
.fp{padding:6px 14px;border-radius:8px;border:1px solid var(--ln2);font-size:12px;color:var(--f3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.fp.on{background:var(--Aub);border-color:var(--AuD);color:var(--Au);}

/* ── WRITE ── */
.wchips{display:flex;gap:6px;padding:9px 18px;border-bottom:1px solid var(--ln);overflow-x:auto;flex-shrink:0;}
.wchips::-webkit-scrollbar{display:none;}
.wch{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;background:var(--s2);border:1px solid var(--ln);font-size:11.5px;color:var(--f3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .13s;}
.wch.on{border-color:var(--AuD);color:var(--Au);background:var(--Aub);}
.wch-d{width:5px;height:5px;border-radius:50%;}
.jsel{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--s2);border:1px solid var(--ln);cursor:pointer;transition:background .12s;}
.jsel:active{background:var(--s3);}
.jdot{width:7px;height:7px;border-radius:50%;}
.jnm{font-size:12px;color:var(--f2);}
.tbar{display:flex;align-items:center;gap:3px;padding:6px 14px;border-bottom:1px solid var(--ln);overflow-x:auto;flex-shrink:0;background:var(--s1);}
.tbar::-webkit-scrollbar{display:none;}
.tb2{min-width:32px;height:30px;border-radius:7px;background:transparent;color:var(--f3);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:background .12s;padding:0 5px;white-space:nowrap;}
.tb2:active{background:var(--s3);color:var(--fg);}
.tbsep{width:1px;height:18px;background:var(--ln);margin:0 3px;flex-shrink:0;}
.wt{width:100%;background:transparent;border:none;outline:none;padding:14px 20px 8px;font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;color:var(--fg);line-height:1.2;}
.wt::placeholder{color:var(--s4);}
.wb{width:100%;background:transparent;border:none;outline:none;padding:10px 20px;font-size:15.5px;color:var(--fg);line-height:1.82;font-weight:300;min-height:180px;}
.wb::placeholder{color:var(--f4);}
.wcbar{display:flex;align-items:center;gap:10px;padding:8px 20px;border-top:1px solid var(--ln);}
.wcl{font-family:'DM Mono',monospace;font-size:10px;color:var(--f4);white-space:nowrap;}
.wctrack{flex:1;height:2px;background:var(--s3);border-radius:99px;overflow:hidden;}
.wcfill{height:100%;background:var(--Au);border-radius:99px;transition:width .3s;}
.wcgoal{font-size:11px;color:var(--f3);white-space:nowrap;}
.msec{padding:10px 20px;border-top:1px solid var(--ln);}
.msec-l{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f4);margin-bottom:8px;}
.mrow{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
.mrow::-webkit-scrollbar{display:none;}
.mo{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;border:1px solid var(--ln);background:var(--s2);font-size:12.5px;color:var(--f2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .13s;}
.mo.on{border-color:var(--AuD);background:var(--Aub);color:var(--Au);}
.mo-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.psec{padding:10px 20px;border-top:1px solid var(--ln);}
.psec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.psec-l{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--f3);}
.padd{padding:5px 13px;border-radius:7px;border:1px solid var(--AuD);background:var(--Aub);font-size:11.5px;color:var(--Au);cursor:pointer;font-weight:500;}
.pstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.pstrip::-webkit-scrollbar{display:none;}
.pt{width:78px;height:78px;border-radius:11px;flex-shrink:0;overflow:hidden;position:relative;border:1px solid var(--ln);}
.pt img{width:100%;height:100%;object-fit:cover;}

const PT={home:'Inkwell',journal:'Journal',write:'New Entry',notes:'Notes',gallery:'Gallery',progress:'Progress',insights:'Insights',me:'Profile'};
function go(tab){

  document.querySelectorAll('.nt').forEach(n=>{const on=n.dataset.tab===tab;n.classList.toggle('on',on);n.style.color=on?'var(--Au)':'var(--f3)';});

function rJournal(){
  const filters=['All','Serene','Proud','Reflective','Heavy','Has Photos','Has Audio'];
  let data=A.entries.filter(e=>{
    if(A.filt==='Has Photos')return e.photos?.length>0;
    if(A.filt==='Has Audio')return e.recordings?.length>0;
    if(A.filt!=='All')return e.mood===A.filt;

}

function bindWP(){

  ta.addEventListener('input',upd);
  document.getElementById('wt')?.addEventListener('input',e=>WS.title=e.target.value);
}

function rStrip(){return WS.photos.map((s,i)=>`<div class="pt"><img src="${s}" loading="lazy"><div class="pt-x" onclick="rmPhoto(${i})">✕</div></div>`).join('')+`<div class="pt-add" onclick="trigCam()"><div class="pt-ai">📷</div><div class="pt-al">Camera</div></div><div class="pt-add" onclick="trigLib()"><div class="pt-ai" style="font-size:20px">🖼</div><div class="pt-al">Library</div></div>`;}
function rRecs(){return WS.recs.map((r,i)=>`<div class="vrec"><div class="vrec-p" onclick="playAudio('${r.data}',this)"><div class="vrec-pi"></div></div><div style="flex:1"><div class="vrec-lb">Voice note ${i+1}</div><div class="vrec-d">${fmtD(r.dur||0)}</div></div><div class="vrec-x" onclick="rmRec(${i})">✕</div></div>`).join('');}

// Photo
function trigCam(){const i=document.getElementById('photo-inp');i.setAttribute('capture','environment');i.removeAttribute('multiple');i.onchange=hdlPhoto;i.click();}
function trigLib(){const i=document.getElementById('photo-inp');i.removeAttribute('capture');i.setAttribute('multiple','multiple');i.onchange=hdlPhoto;i.click();}
function hdlPhoto(e){
  const files=Array.from(e.target.files||[]);if(!files.length)return;
  Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsDataURL(f);}))).then(rs=>{WS.photos.push(...rs);const s=document.getElementById('pstrip');if(s)s.innerHTML=rStrip();toast(`${rs.length} photo${rs.length>1?'s':''} attached`);});
  e.target.value='';
}
function rmPhoto(i){WS.photos.splice(i,1);const s=document.getElementById('pstrip');if(s)s.innerHTML=rStrip();}

// Voice
async function togRec(){
  if(!REC.rec||REC.rec.state==='inactive'){await startRec();}else{stopRec();}
}
async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    REC.stream=stream;REC.chunks=[];REC.t0=Date.now();REC.dur=0;
    const opts=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?{mimeType:'audio/webm;codecs=opus'}:MediaRecorder.isTypeSupported('audio/mp4')?{mimeType:'audio/mp4'}:{};
    REC.rec=new MediaRecorder(stream,opts);
    REC.rec.ondataavailable=e=>{if(e.data.size>0)REC.chunks.push(e.data);};
    REC.rec.onstop=procRec;
    REC.rec.start(100);
    document.getElementById('vbtn')?.classList.add('rec');
    document.getElementById('vdot')?.classList.add('rec');
    document.getElementById('vit').textContent='Recording…';
    document.getElementById('vis').textContent='Tap to stop';
    document.getElementById('vwrap').innerHTML='<div class="vwrap"><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div><div class="vw"></div></div>';
    const rtmr=document.getElementById('rtmr');if(rtmr)rtmr.style.display='block';
    REC.timer=setInterval(()=>{REC.dur=Math.floor((Date.now()-REC.t0)/1000);const t=document.getElementById('rtmr');if(t)t.textContent=fmtD(REC.dur);},1000);

function stopRec(){

    <div class="srow"><div style="flex:1"><div class="srl">Backup to cloud</div><div class="srs">Auto-sync</div></div><div class="srr"><div class="tgl${s.backup?' on':''}" id="t-backup" onclick="togS('backup')"></div></div></div>
    <div class="srow" onclick="exportData()"><div style="flex:1"><div class="srl">Export all data</div><div class="srs">Download as JSON</div></div><div class="srr"><span class="sra">›</span></div></div>
    <div class="srow" onclick="importData()"><div style="flex:1"><div class="srl">Import data</div><div class="srs">Restore from backup</div></div><div class="srr"><span class="sra">›</span></div></div>
    <div class="srow" style="border-bottom:none" onclick="clearData()"><div style="flex:1"><div class="srl" style="color:var(--re)">Delete all data</div><div class="srs">Cannot be undone</div></div><div class="srr"><span class="sra" style="color:var(--re)">›</span></div></div>
  </div></div>
  <div class="sgrp"><div class="sgl">Subscription</div><div class="blk">
    <div class="srow"><div style="flex:1"><div class="srl">Inkwell Pro</div><div class="srs">Renews Apr 24, 2026 · $4.99/mo</div></div><div class="srr"><span class="badge pro">Pro</span><span class="sra">›</span></div></div>
    <div class="srow" style="border-bottom:none"><div style="flex:1"><div class="srl">Refer a friend</div><div class="srs">Get 1 month free</div></div><div class="srr"><span class="badge new">Earn</span><span class="sra">›</span></div></div>
  </div></div>
  <div class="sgrp"><div class="sgl">About</div><div class="blk">
    ${['Privacy Policy','Terms of Service','Rate Inkwell','Send Feedback'].map((l,i,arr)=>`<div class="srow"${i===arr.length-1?' style="border-bottom:none"':''}><div class="srl">${l}</div><span class="sra">›</span></div>`).join('')}
  </div></div>
  <div class="signout" onclick="if(confirm('Sign out of Inkwell?'))toast('Signed out')">Sign out</div>
  <div class="ver">Inkwell · v4.0 · ${A.theme} theme</div>`;
}

function togS(k){A.settings[k]=!A.settings[k];DB.set('settings',A.settings);const el=document.getElementById('t-'+k);if(el)el.classList.toggle('on',A.settings[k]);}
function chTheme(t){setTheme(t);renderPage();}
function editName(){const n=prompt('Your name:',A.name);if(n?.trim()){A.name=n.trim();DB.set('name',A.name);renderPage();toast('Name updated');}}
function setGoal(){const g=parseInt(prompt('Daily goal (words):',A.goal));if(g>0){A.goal=g;DB.set('goal',g);renderPage();toast('Goal set to '+g+' words');}}
function exportData(){const blob=new Blob([JSON.stringify({entries:A.entries,notes:A.notes,settings:A.settings,name:A.name,goal:A.goal,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='inkwell-backup-'+Date.now()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Exported successfully');}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.entries)A.entries=d.entries;if(d.notes)A.notes=d.notes;if(d.name)A.name=d.name;if(d.goal)A.goal=d.goal;save();DB.set('name',A.name);DB.set('goal',A.goal);renderPage();toast('Imported: '+A.entries.length+' entries');}catch{toast('Invalid backup file');}};r.readAsText(f);};i.click();}
function clearData(){if(confirm('Delete ALL data? Cannot be undone.')){A.entries=[];A.notes=[];A.settings={rem:true,streak:true,weekly:false,faceID:true,enc:true,priv:false,backup:false};save();renderPage();toast('All data cleared');}}

// ═══ DRAWER ══════════════════════════════
function openDrw(){
  if(document.getElementById('drw'))return;
  const tw=A.entries.reduce((a,e)=>a+(e.words||0),0);
  const bg=document.createElement('div');bg.id='dbg';bg.onclick=closeDrw;
  const d=document.createElement('div');d.id='drw';
  const nav=[{id:'home',ico:'⌂',l:'Home'},{id:'journal',ico:'≡',l:'Journal'},{id:'write',ico:'✎',l:'New Entry'},null,{id:'notes',ico:'◻',l:'Notes'},{id:'gallery',ico:'▣',l:'Gallery'},null,{id:'progress',ico:'◎',l:'Progress'},{id:'insights',ico:'◉',l:'Insights'},null,{id:'me',ico:'◯',l:'Profile & Settings'}];
  d.innerHTML=`<div class="dtop"><div class="dav">${A.name.charAt(0).toUpperCase()}</div><div class="dname">${A.name}</div><div class="dplan">✦ Inkwell Pro</div><div class="dstats"><div><div class="dsv">42</div><div class="dsl">Streak</div></div><div><div class="dsv">${A.entries.length}</div><div class="dsl">Entries</div></div><div><div class="dsv">${A.notes.length}</div><div class="dsl">Notes</div></div></div></div>
  <div class="dnav">${nav.map(it=>it===null?`<div class="dsep"></div>`:`<div class="di${A.tab===it.id?' on':''}" onclick="drwGo('${it.id}')"><div class="di-ico">${it.ico}</div><div class="di-l">${it.l}</div></div>`).join('')}</div>
  <div class="dfoot"><div class="dso" onclick="if(confirm('Sign out?'))toast('Signed out')">Sign out</div><div class="dver">Inkwell v4.0</div></div>`;
  document.getElementById('screen').appendChild(bg);
  document.getElementById('screen').appendChild(d);
}
function closeDrw(){document.getElementById('dbg')?.remove();document.getElementById('drw')?.remove();}
function drwGo(tab){closeDrw();if(tab==='write')openWrite(null);else go(tab);}

// ═══ TOAST ═══════════════════════════════
let _tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2600);}

// ═══ INIT ════════════════════════════════
setTheme(A.theme);
go('home');

// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{scope:'./'})
      .then(()=>console.log('✦ SW ready'))
      .catch(e=>console.warn('SW:',e));
  });
}

// Android back button
window.addEventListener('popstate',()=>{
  for(const id of['mbg','wpanel','npanel','edet','dbg','pv']){const el=document.getElementById(id);if(el){el.remove();if(id==='wpanel')stopRec();return;}}
});

// Prevent pull-to-refresh
document.addEventListener('touchmove',e=>{if(e.target===document.body)e.preventDefault();},{passive:false});
</script>
</body>
</html>
